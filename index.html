<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0c29" />
  <title>Hello, James</title>
  <style>
    /* Reset & base */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --gradient-start: #0f0c29;
      --gradient-mid: #302b63;
      --gradient-end: #24243e;
      --text-primary: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.6);
      --accent: #a78bfa;
    }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-mid) 50%, var(--gradient-end) 100%);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Skip link */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 0;
      background: var(--accent);
      color: #000;
      padding: 8px 16px;
      border-radius: 0 0 8px 0;
      font-weight: 600;
      z-index: 100;
      transition: top 0.2s ease;
      text-decoration: none;
    }
    .skip-link:focus-visible {
      top: 0;
    }

    /* Card container */
    main {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      max-width: 640px;
      width: 100%;
    }

    /* Decorative glow ring */
    .glow-ring {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      margin-bottom: 2.5rem;
      background: radial-gradient(circle, rgba(167, 139, 250, 0.15) 0%, transparent 70%);
      animation: pulse 3s ease-in-out infinite;
      aria-hidden: true;
    }

    .glow-ring::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(167, 139, 250, 0.3);
      animation: ring-expand 3s ease-in-out infinite;
    }

    .glow-ring-icon {
      font-size: 4rem;
      line-height: 1;
      user-select: none;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.04); opacity: 0.9; }
    }

    @keyframes ring-expand {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.12); opacity: 0.6; }
    }

    /* Heading */
    h1 {
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
      text-wrap: balance;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(0.95rem, 2.5vw, 1.125rem);
      color: var(--text-sub);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 2.5rem;
    }

    /* Divider */
    .divider {
      width: 48px;
      height: 2px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
      margin: 0 auto;
    }

    /* Reduce motion */
    @media (prefers-reduced-motion: reduce) {
      .glow-ring,
      .glow-ring::before {
        animation: none;
      }
    }

    /* Dark mode (explicit override if OS is light) */
    @media (prefers-color-scheme: light) {
      :root {
        --gradient-start: #e0e7ff;
        --gradient-mid: #c7d2fe;
        --gradient-end: #ddd6fe;
        --text-primary: #1e1b4b;
        --text-sub: rgba(30, 27, 75, 0.55);
        --accent: #7c3aed;
      }

      h1 {
        background: linear-gradient(135deg, #1e1b4b 30%, var(--accent) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .glow-ring {
        background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
      }

      .glow-ring::before {
        border-color: rgba(124, 58, 237, 0.25);
      }
    }

    /* Responsive fine-tuning */
    @media (max-width: 480px) {
      .glow-ring {
        width: 120px;
        height: 120px;
        margin-bottom: 1.75rem;
      }
      .glow-ring-icon {
        font-size: 2.75rem;
      }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>

  <main id="main-content">
    <div class="glow-ring" aria-hidden="true">
      <span class="glow-ring-icon">👋</span>
    </div>

    <h1>Hello, James</h1>
    <p class="subtitle">Welcome back</p>
    <div class="divider" aria-hidden="true"></div>
  </main>
</body>
</html>
