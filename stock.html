<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <script>
    // FOUC 방지: 페이지 렌더링 전에 스킨 적용
    (function() {
      var skin = localStorage.getItem('stock-skin') || 'black';
      if (skin === 'white') document.documentElement.setAttribute('data-skin', 'white');
    })();
  </script>
  <title>주식투자 - JamesClaw</title>
  <link rel="icon" type="image/png" href="https://openclaw.ai/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="https://openclaw.ai/apple-touch-icon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>

  <style>
    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:   #0f172a;
      --bg-card:   #1e293b;
      --bg-header: #0f172a;
      --border:    #334155;
      --text:      #f8fafc;
      --text-muted:#94a3b8;
      --positive:  #f97316;
      --negative:  #38bdf8;
      --neutral:   #e2e8f0;
      --accent:    #38bdf8;
      --radius:    12px;
      --gap:       16px;
      --header-height: 70px;

      /* Chart line colors per indicator */
      --c0: #38bdf8;
      --c1: #f59e0b;
      --c2: #f97316;
      --c3: #a78bfa;
      --c4: #fb923c;
    }

    /* ===== White Skin ===== */
    html[data-skin="white"] {
      --bg-page:   #f8fafc;
      --bg-card:   #ffffff;
      --bg-header: #f1f5f9;
      --border:    #e2e8f0;
      --text:      #0f172a;
      --text-muted:#64748b;
      --positive:  #ea580c;
      --negative:  #0284c7;
      --neutral:   #64748b;
      --accent:    #0284c7;
    }

    /* White skin: additional overrides for elements with hardcoded dark colors */
    html[data-skin="white"] .tab-bar { background: #e2e8f0; }
    html[data-skin="white"] .btn-refresh { background: #0284c7; color: #ffffff; border-color: #0284c744; }
    html[data-skin="white"] .btn-refresh:hover { background: #0369a1; }
    html[data-skin="white"] .btn-home { background: rgba(0,0,0,0.05); color: var(--text-muted); border-color: rgba(0,0,0,0.12); }
    html[data-skin="white"] .btn-home:hover { background: rgba(0,0,0,0.10); color: var(--text); border-color: rgba(0,0,0,0.22); }
    html[data-skin="white"] .skel-line { background: #cbd5e1; }
    html[data-skin="white"] .chart-skel-bar { background: #cbd5e1; }
    html[data-skin="white"] .skeleton::after,
    html[data-skin="white"] .chart-skeleton::after { background: linear-gradient(90deg, transparent 0%, rgba(0,0,0,0.04) 50%, transparent 100%); }
    html[data-skin="white"] .btn-chart-period:hover:not([aria-pressed="true"]) { background: #e2e8f0; color: var(--text); }
    html[data-skin="white"] .search-result-item:hover { background: rgba(0,0,0,0.04); }
    html[data-skin="white"] .error-banner { background: #fff1f2; border-color: #fca5a5; }
    html[data-skin="white"] .error-banner p { color: #dc2626; }
    html[data-skin="white"] .btn-retry { background: #fca5a5; color: #7f1d1d; border-color: #dc2626; }
    html[data-skin="white"] .btn-retry:hover { background: #fecaca; }

    html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

    body {
      background: var(--bg-page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    /* ===== Skip Link ===== */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 999;
      background: var(--accent);
      color: #0f172a;
      padding: 0.5rem 1rem;
      border-radius: 0 0 8px 8px;
      font-weight: 600;
      text-decoration: none;
      transition: top 150ms ease;
    }
    .skip-link:focus { top: 0; }

    /* ===== Layout ===== */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--gap) 3rem;
    }

    /* ===== Header ===== */
    .dashboard-header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 0.75rem var(--gap);
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .header-left h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-row-bottom {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: #1e3a5f;
      color: var(--accent);
      border: 1px solid #2563eb44;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 180ms ease, transform 100ms ease;
      min-height: 36px;
      white-space: nowrap;
    }
    .btn-refresh:hover { background: #1e4a7f; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Skin Toggle Button ===== */
    .btn-skin {
      display: flex;
      align-items: center;
      gap: 4px;
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 200ms;
      min-height: 36px;
      white-space: nowrap;
    }
    .btn-skin:hover { background: var(--border); }
    .btn-skin:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* ===== Home Button ===== */
    .btn-home {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: rgba(255,255,255,0.07);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease;
      min-height: 36px;
      white-space: nowrap;
    }
    .btn-home:hover {
      background: rgba(255,255,255,0.14);
      color: var(--text);
    }
    .btn-home:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

    /* 데스크탑에서는 btn-label 표시 */
    @media (min-width: 601px) {
      .btn-label { display: inline; }
    }

    /* 모바일 */
    @media (max-width: 600px) {
      .dashboard-header {
        padding: 0.5rem var(--gap);
        padding-top: calc(0.5rem + env(safe-area-inset-top, 0px));
      }
      .header-left h1 {
        font-size: 1.05rem;
      }
      .header-actions {
        gap: 6px;
      }
      /* 모바일에서 버튼 텍스트 숨기고 아이콘만 */
      .btn-label {
        display: none;
      }
      .btn-skin {
        padding: 6px 8px;
      }
      .btn-refresh {
        padding: 6px 8px;
      }
      .btn-home {
        padding: 6px 8px;
      }
      .header-row-bottom {
        font-size: 0.72rem;
      }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
    }
    @media (prefers-reduced-motion: no-preference) {
      .spinner { animation: spin 0.7s linear infinite; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== KPI Grid ===== */
    .kpi-section {
      margin-top: 1.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }

    /* ===== KPI Card ===== */
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 140px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      scroll-margin-top: calc(var(--header-height) + var(--tab-bar-height, 44px) + 16px);
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .kpi-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .kpi-card__source {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: auto;
      padding-top: 8px;
      display: block;
    }

    .kpi-card__label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .kpi-card__value {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .kpi-card__change {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .kpi-card__change.up   { color: var(--positive); }
    .kpi-card__change.down { color: var(--negative); }
    .kpi-card__change.flat { color: var(--neutral); }

    .kpi-card__date {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 1px;
      opacity: 0.8;
    }

    .kpi-card__error {
      font-size: 0.82rem;
      color: var(--negative);
      margin-top: auto;
    }

    /* ===== KPI Card with Investors ===== */
    .kpi-card--with-investors {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    /* 모바일에서도 투자자 데이터를 오른쪽에 유지 */
    .kpi-card__main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi-card__investors {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 90px;
      border-left: 1px solid var(--border);
      padding-left: 10px;
      align-self: center;
    }
    .kpi-card__investor-row {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .kpi-card__investor-label {
      color: #64748b;
    }
    .kpi-card__investor-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .kpi-card__investor-value.up { color: var(--positive); }
    .kpi-card__investor-value.down { color: var(--negative); }

    /* ===== Skeleton ===== */
    .skeleton {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      min-height: 120px;
      overflow: hidden;
      position: relative;
    }

    .skel-line {
      background: #334155;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    @media (prefers-reduced-motion: no-preference) {
      .skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
    }

    /* ===== Charts Section ===== */
    .charts-section {
      margin-top: 2rem;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      transition: background 0.3s ease, background-color 0.3s ease;
      cursor: pointer;
      scroll-margin-top: calc(var(--header-height) + var(--tab-bar-height, 44px) + 16px);
    }

    /* Chart card header: title + per-chart period toggle */
    .chart-card__header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 0.5rem;
    }

    .chart-card__header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .chart-card__title {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card__price-info {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0;
      margin: 0;
    }
    .chart-card__current {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }
    .chart-card__change {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .chart-card__change.up {
      color: var(--positive);
      background: rgba(249,115,22,0.1);
    }
    .chart-card__change.down {
      color: var(--negative);
      background: rgba(56,189,248,0.1);
    }
    .chart-card__change.flat {
      color: var(--neutral);
    }

    /* Per-chart price stats bar */
    .chart-stats {
      display: flex;
      gap: 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.65rem;
      flex-wrap: wrap;
    }

    .stat-current { color: var(--text); }
    .stat-high    { color: #f97316; }
    .stat-low     { color: #38bdf8; }

    /* Per-chart period toggle (compact) */
    .chart-period-toggle {
      display: flex;
      gap: 2px;
      background: var(--bg-page);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn-chart-period {
      padding: 0.2rem 0.55rem;
      border: none;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: background 150ms ease, color 150ms ease;
      min-height: 26px;
      line-height: 1;
    }

    .btn-chart-period:hover:not([aria-pressed="true"]) {
      background: #334155;
      color: var(--text);
    }

    .btn-chart-period[aria-pressed="true"] {
      background: #3b82f6;
      color: #fff;
    }

    .btn-chart-period:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chart-canvas-wrapper canvas {
      max-height: 220px;
    }

    /* skeleton chart */
    .chart-skeleton {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      min-height: 260px;
      overflow: hidden;
      position: relative;
    }
    @media (prefers-reduced-motion: no-preference) {
      .chart-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
    }
    .chart-skel-bar {
      background: #334155;
      border-radius: 4px;
    }

    /* ===== Error Banner ===== */
    .error-banner {
      background: #450a0a;
      border: 1px solid #991b1b;
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .error-banner p {
      color: #fca5a5;
      font-size: 0.9rem;
      flex: 1;
    }

    .btn-retry {
      padding: 0.4rem 0.9rem;
      background: #991b1b;
      color: #fca5a5;
      border: 1px solid #dc262644;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
      white-space: nowrap;
    }
    .btn-retry:hover { background: #7f1d1d; }
    .btn-retry:focus-visible { outline: 2px solid #38bdf8; outline-offset: 2px; }

    /* ===== Empty Chart State ===== */
    .chart-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 0.4rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .chart-empty-state__icon {
      font-size: 2rem;
      opacity: 0.55;
    }
    .chart-empty-state__title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .chart-empty-state__hint {
      font-size: 0.76rem;
      color: #475569;
      margin-top: 2px;
    }

    /* hidden */
    .hidden { display: none !important; }

    /* ===== Tab Bar ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      background: var(--bg-header);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-height, 70px);
      z-index: 99;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* ===== Stock Search ===== */
    .stock-search {
      padding: 1rem 0;
      position: relative;
    }
    .search-input-wrap {
      display: flex;
      gap: 8px;
    }
    #stock-search-input {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    #stock-search-input:focus {
      border-color: var(--accent);
    }
    #stock-search-input::placeholder {
      color: var(--text-muted);
    }
    .btn-search {
      padding: 0.75rem 1.25rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 150ms ease;
    }
    .btn-search:hover { background: #1d4ed8; }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      margin-top: 4px;
    }
    .search-result-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-result-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .search-result-item:last-child {
      border-bottom: none;
    }
    /* Delete stock button */
    .btn-remove-stock {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 150ms ease, background 150ms ease;
      flex-shrink: 0;
    }
    .btn-remove-stock:hover {
      color: var(--negative);
      background: rgba(56,189,248,0.1);
    }

    @media (max-width: 600px) {
      .chart-card__header-top {
        flex-wrap: wrap;
        gap: 4px;
      }
      .chart-card__title {
        font-size: 0.85rem;
      }
      .chart-card__current {
        font-size: 1rem;
      }
    }

    /* ===== Trade Form ===== */

<script>
// ─────────────────────────────────────────────
//  KR_STOCK_DICT 제거 — KRX 전 종목은 /api/kr-search 로 동적 검색
// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
//  지표 목록 — 여기에 추가하면 카드+차트 자동 생성
// ─────────────────────────────────────────────
const INDICATORS = [
  { symbol: 'CL=F',  name: 'WTI 유가',      unit: 'USD' },
  { symbol: 'KRW=X', name: 'USD/KRW 환율',  unit: '원'  },
  { symbol: '^KS11', name: '코스피',          unit: 'pt'  },
  { symbol: '^KQ11', name: '코스닥',          unit: 'pt'  },
  { symbol: '^IXIC', name: '나스닥',          unit: 'pt'  },
  { symbol: '^TNX',  name: '미국10년국채',   unit: '%'   },
  // 여기에 새 지표 추가하면 자동으로 카드+차트 생성
];

// Period options
const PERIOD_OPTIONS = [
  { id: '1d',  range: '1d',  interval: '5m',  label: '1일' },
  { id: '5d',  range: '5d',  interval: '15m', label: '1주' },
  { id: '1mo', range: '1mo', interval: '1d',  label: '1개월' },
  { id: '3mo', range: '3mo', interval: '1d',  label: '3개월' },
  { id: '1y',  range: '1y',  interval: '1wk', label: '1년' },
  { id: '10y', range: '10y', interval: '1mo', label: '10년' },
];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let charts = {};               // symbol → Chart instance
let stockCharts = {};          // symbol → Chart instance (개별종목)
let autoRefreshTimer = null;
let lastIndicatorData = null;  // 마지막으로 렌더링한 주요정보 데이터
let lastStocksData    = null;  // 마지막으로 렌더링한 개별종목 데이터
let isLoading = false;
let isStocksLoading = false;
let investorData = null;       // 투자자별 매매동향 (코스피/코스닥)

// Per-chart period state — default: 1일
const chartPeriods = {};       // symbol → { range, interval, label }
INDICATORS.forEach(ind => {
  chartPeriods[ind.symbol] = { ...PERIOD_OPTIONS[0] };
});

// ─────────────────────────────────────────────
//  localStorage 관리
// ─────────────────────────────────────────────
const STORAGE_KEY = 'jamesclaw-stocks';

function loadSavedStocks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [
    { symbol: '005930.KS', name: '삼성전자', unit: '원' },
    { symbol: '000660.KS', name: 'SK하이닉스', unit: '원' },
  ];
}

function saveStocks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STOCKS));
}

// ─────────────────────────────────────────────
//  개별종목 목록
// ─────────────────────────────────────────────
let STOCKS = loadSavedStocks();

const stockChartPeriods = {};
STOCKS.forEach(s => {
  stockChartPeriods[s.symbol] = { ...PERIOD_OPTIONS[0] };
});

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function formatValue(value, unit) {
  if (value == null) return '—';
  if (unit === 'USD') return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (unit === '원')  return value.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
  // pt (코스피, 코스닥, 나스닥)
  return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(isoString) {
  try {
    return new Date(isoString).toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hour12: false,
    });
  } catch { return isoString; }
}

function changeClass(pct) {
  if (pct == null) return 'flat';
  if (pct > 0) return 'up';
  if (pct < 0) return 'down';
  return 'flat';
}

function changeArrow(pct) {
  if (pct == null) return '';
  if (pct > 0) return '↑ ';
  if (pct < 0) return '↓ ';
  return '';
}

function formatChangeText(change, changePercent, unit) {
  if (changePercent == null) return '';
  const arrow = changeArrow(changePercent);
  const sign = change > 0 ? '+' : change < 0 ? '-' : '';
  const absChange = change != null ? formatValue(Math.abs(change), unit) : '';
  const pctSign = changePercent > 0 ? '+' : '';
  if (absChange) {
    return `${arrow}${sign}${absChange}${unit} (${pctSign}${changePercent.toFixed(2)}%)`;
  }
  return `${arrow}${pctSign}${changePercent.toFixed(2)}%`;
}

// ─────────────────────────────────────────────
//  Skeleton Rendering
// ─────────────────────────────────────────────
function renderSkeletons() {
  const kpiGrid = document.getElementById('kpi-grid');
  const chartsGrid = document.getElementById('charts-grid');

  kpiGrid.innerHTML = INDICATORS.map(() => `
    <div class="skeleton" aria-hidden="true">
      <div class="skel-line" style="width:60%;height:12px;"></div>
      <div class="skel-line" style="width:80%;height:32px;"></div>
      <div class="skel-line" style="width:50%;height:12px;"></div>
    </div>
  `).join('');

  chartsGrid.innerHTML = INDICATORS.map(() => `
    <div class="chart-skeleton" aria-hidden="true">
      <div class="chart-skel-bar" style="width:45%;height:12px;margin-bottom:16px;"></div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:160px;margin-bottom:8px;">
        ${Array.from({length:20},(_,i)=>`<div class="chart-skel-bar" style="flex:1;height:${20+Math.sin(i)*40+40}px;opacity:${0.3+i*0.03};"></div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
//  KPI Card Rendering (변동률은 항상 전일 대비)
// ─────────────────────────────────────────────
function renderKPICards(data) {
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = INDICATORS.map(ind => {
    const d = data[ind.symbol];
    if (!d) return renderKPIError(ind, '데이터 없음');
    if (d.error) return renderKPIError(ind, d.error);
    return renderKPICard(ind, d);
  }).join('');
}

function renderKPICard(ind, d) {
  const cls = changeClass(d.changePercent);
  const arrow = changeArrow(d.changePercent);
  const pct = d.changePercent != null ? `${Math.abs(d.changePercent).toFixed(2)}%` : '—';
  const changeAbs = d.change != null ? formatValue(Math.abs(d.change), ind.unit) : '—';
  const isNaver = ind.symbol === '^KS11' || ind.symbol === '^KQ11' || ind.symbol === 'KRW=X' || ind.symbol.endsWith('.KS') || ind.symbol.endsWith('.KQ');
  const sourceLabel = isNaver ? '출처: NAVER Finance' : '출처: Yahoo Finance';
  const lastDateLabel = d.lastMarketDate ? formatLastMarketDateLabel(d.lastMarketDate) : null;
  const lastDateHTML = lastDateLabel
    ? `<div class="kpi-card__date">${escapeHtml(lastDateLabel)}</div>`
    : '';

  // 코스피/코스닥만 투자자 데이터 표시
  let investorHTML = '';
  if (investorData && (ind.symbol === '^KS11' || ind.symbol === '^KQ11')) {
    const inv = ind.symbol === '^KS11' ? investorData.kospi : investorData.kosdaq;
    if (inv) {
      const fmt = (v) => {
        if (v == null) return '<span class="kpi-card__investor-value">—</span>';
        const sign = v > 0 ? '+' : '';
        const cls = v > 0 ? 'up' : v < 0 ? 'down' : '';
        return `<span class="kpi-card__investor-value ${cls}">${sign}${v.toLocaleString()}억</span>`;
      };
      investorHTML = `
        <div class="kpi-card__investors">
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">외국인</span>${fmt(inv.foreign)}
          </div>
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">기관</span>${fmt(inv.institutional)}
          </div>
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">개인</span>${fmt(inv.individual)}
          </div>
        </div>
      `;
    }
  }

  if (investorHTML) {
    return `
    <div class="kpi-card kpi-card--with-investors" id="kpi-${escapeHtml(ind.symbol)}" role="button" tabindex="0" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${ind.name} ${formatValue(d.current, ind.unit)} ${ind.unit}, 클릭하면 차트로 이동">
      <div class="kpi-card__main">
        <div class="kpi-card__label">
          ${escapeHtml(ind.name)}
          <small style="color:#475569;font-size:0.7rem;">(${ind.unit})</small>
        </div>
        <div class="kpi-card__value">${formatValue(d.current, ind.unit)}</div>
        ${lastDateHTML}
        <div class="kpi-card__change ${cls}">${arrow}${changeAbs}${ind.unit} (${d.changePercent > 0 ? '+' : ''}${pct})</div>
        <div class="kpi-card__source">${sourceLabel}</div>
      </div>
      ${investorHTML}
    </div>
  `;
  }

  return `
    <div class="kpi-card" id="kpi-${escapeHtml(ind.symbol)}" role="button" tabindex="0" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${ind.name} ${formatValue(d.current, ind.unit)} ${ind.unit}, 클릭하면 차트로 이동">
      <div class="kpi-card__label">
        ${escapeHtml(ind.name)}
        <small style="color:#475569;font-size:0.7rem;">(${ind.unit})</small>
      </div>
      <div class="kpi-card__value">${formatValue(d.current, ind.unit)}</div>
      ${lastDateHTML}
      <div class="kpi-card__change ${cls}">${arrow}${changeAbs}${ind.unit} (${d.changePercent > 0 ? '+' : ''}${pct})</div>
      <div class="kpi-card__source">${sourceLabel}</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  Chart Stats (현재/최고/최저)
// ─────────────────────────────────────────────
function calcChartStats(history, unit) {
  if (!history || history.length === 0) return null;
  const closes = history.map(h => h.close).filter(v => v != null);
  if (closes.length === 0) return null;
  const current = closes[closes.length - 1];
  const high    = Math.max(...closes);
  const low     = Math.min(...closes);
  return { current, high, low };
}

function renderChartStatsHTML(stats, unit, indName) {
  if (!stats) return `
    <div class="chart-stats" aria-label="${escapeHtml(indName)} 가격 통계 없음">
      <span class="stat-current">현재 —</span>
      <span class="stat-high">최고 —</span>
      <span class="stat-low">최저 —</span>
    </div>`;
  return `
    <div class="chart-stats" aria-label="${escapeHtml(indName)} 가격 통계">
      <span class="stat-current" aria-label="현재가 ${formatValue(stats.current, unit)}">현재 ${formatValue(stats.current, unit)}</span>
      <span class="stat-high"    aria-label="최고가 ${formatValue(stats.high, unit)}">최고 ${formatValue(stats.high, unit)}</span>
      <span class="stat-low"     aria-label="최저가 ${formatValue(stats.low, unit)}">최저 ${formatValue(stats.low, unit)}</span>
    </div>
  `;
}

//  Chart Rendering

/** Build chart card HTML for one indicator */
function buildChartCardHTML(ind, i, history, lastTradeDate, changePercent, current, change) {
  const period = chartPeriods[ind.symbol];
  const stats  = calcChartStats(history, ind.unit);

  // For 1d charts, append date suffix if data is from a past trading day
  const dateSuffix = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel  = dateSuffix ? escapeHtml(dateSuffix) : '';

  return `
    <div class="chart-card" id="chart-${escapeHtml(ind.symbol)}">
      <div class="chart-card__header">
        <div class="chart-card__header-top">
          <div class="chart-card__title">
            ${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}
          </div>
          <div class="chart-period-toggle" role="group" aria-label="${escapeHtml(ind.name)} 기간 선택">
            ${PERIOD_OPTIONS.map(opt => `
              <button
                class="btn-chart-period"
                data-idx="${i}"
                data-symbol="${escapeHtml(ind.symbol)}"
                data-range="${opt.range}"
                data-interval="${opt.interval}"
                data-label="${opt.label}"
                aria-pressed="${period.range === opt.range}"
                aria-label="${escapeHtml(ind.name)} ${opt.label} 보기"
              >${opt.label}</button>
            `).join('')}
          </div>
        </div>
        <div class="chart-card__price-info">
          <span class="chart-card__current">${current != null ? formatValue(current, ind.unit) : ''}</span>
          <span class="chart-card__change ${changeClass(changePercent)}">
            ${formatChangeText(change, changePercent, ind.unit)}
          </span>
        </div>
      </div>
      ${renderChartStatsHTML(stats, ind.unit, ind.name)}
      <div class="chart-canvas-wrapper" id="chart-canvas-${i}">
        <canvas id="chart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>
      </div>
    </div>
  `;
}

/** Render full charts grid */
function renderCharts(data) {
  lastIndicatorData = data;
  const grid = document.getElementById('charts-grid');

  // Destroy old chart instances
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  grid.innerHTML = INDICATORS.map((ind, i) => {
    const d = data[ind.symbol];
    const history = d?.history || [];
    const lastTradeDate = d?.lastTradeDate || null;
    return buildChartCardHTML(ind, i, history, lastTradeDate, d?.changePercent, d?.current, d?.change);
  }).join('');

  // Draw each chart
  INDICATORS.forEach((ind, i) => {
    const d = data[ind.symbol];
    const history = d?.history || [];
    drawChart(ind, i, history, d?.changePercent, d?.previousClose);
  });

  // Attach per-chart period button listeners
  attachChartPeriodListeners();
}

// ─────────────────────────────────────────────
//  Chart Theme (skin-aware)
// ─────────────────────────────────────────────
function getChartTheme() {
  const isWhite = document.documentElement.getAttribute('data-skin') === 'white';
  return {
    gridColor:     isWhite ? '#e2e8f0' : '#1e293b',
    tickColor:     '#64748b',
    tooltipBg:     isWhite ? '#ffffff' : '#1e293b',
    tooltipBorder: isWhite ? '#e2e8f0' : '#334155',
    tooltipTitle:  isWhite ? '#64748b' : '#94a3b8',
    tooltipBody:   isWhite ? '#0f172a' : '#f8fafc',
    prevCloseLine: '#94a3b8',
  };
}

function getCardBg(range) {
  const isWhite = document.documentElement.getAttribute('data-skin') === 'white';
  if (isWhite) return range === '1d' ? '#ffffff' : '#f0f4ff';
  return range === '1d' ? '#1e293b' : '#2d1b4e';
}

/** Draw (or redraw) a single chart */
function drawChart(ind, i, history, changePercent, previousClose) {
  const period  = chartPeriods[ind.symbol];
  const wrapper = document.getElementById(`chart-canvas-${i}`);
  const canvas  = document.getElementById(`chart-${i}`);
  if (!wrapper && !canvas) return;

  if (history.length === 0) {
    // 빈 데이터: 캔버스 대신 안내 메시지 표시
    const emptyHtml = `
      <div class="chart-empty-state" role="status" aria-label="${escapeHtml(ind.name)} 데이터 없음">
        <span class="chart-empty-state__icon" aria-hidden="true">📭</span>
        <p class="chart-empty-state__title">데이터 없음</p>
        <p class="chart-empty-state__hint">거래 데이터를 가져오지 못했습니다</p>
      </div>`;
    if (wrapper) {
      wrapper.innerHTML = emptyHtml;
    } else if (canvas) {
      canvas.style.display = 'none';
      canvas.insertAdjacentHTML('afterend', emptyHtml);
    }
    return;
  }

  const labels = history.map(h => {
    if ((period.range === '1d' || period.range === '5d') && h.date.includes('T')) {
      const dt = new Date(h.date);
      if (period.range === "5d") return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
      return dt.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    if (period.range === '10y') {
      // Monthly data → YYYY/M
      const parts = h.date.split('-');
      return `${parts[0]}/${parseInt(parts[1])}`;
    }
    // 1mo, 3mo, 1y → M/D
    const parts = h.date.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const values = history.map(h => h.close);
  const color  = changePercent > 0 ? '#f97316' : changePercent < 0 ? '#38bdf8' : '#e2e8f0';
  const ctx    = canvas.getContext('2d');

  // Gradient fill
  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, color + '33');
  gradient.addColorStop(1, color + '00');

  const prevClosePlugin = previousClose != null ? {
    id: 'prevCloseLine',
    afterDraw(chart) {
      const yScale = chart.scales.y;
      const y = yScale.getPixelForValue(previousClose);
      if (y < yScale.top || y > yScale.bottom) return;
      const ctx = chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([]);
      ctx.strokeStyle = getChartTheme().prevCloseLine;
      ctx.lineWidth = 1;
      ctx.moveTo(chart.chartArea.left, y);
      ctx.lineTo(chart.chartArea.right, y);
      ctx.stroke();
      ctx.restore();
    }
  } : null;

  charts[ind.symbol] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: ind.name,
        data: values,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? false : { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: getChartTheme().tooltipBg,
          borderColor: getChartTheme().tooltipBorder,
          borderWidth: 1,
          titleColor: getChartTheme().tooltipTitle,
          bodyColor: getChartTheme().tooltipBody,
          callbacks: {
            label: ctx => ` ${formatValue(ctx.parsed.y, ind.unit)} ${ind.unit}`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: getChartTheme().gridColor },
          ticks: {
            color: getChartTheme().tickColor,
            maxTicksLimit: 6,
            font: { size: 11 },
          }
        },
        y: {
          ...(previousClose != null && values.length > 0 ? {
            suggestedMin: Math.min(previousClose, Math.min(...values)),
            suggestedMax: Math.max(previousClose, Math.max(...values)),
          } : {}),
          grid: { color: getChartTheme().gridColor },
          ticks: {
            color: getChartTheme().tickColor,
            font: { size: 11 },
            callback: v => ind.unit === '%' ? v.toFixed(2) : Math.round(v).toLocaleString('ko-KR'),
          }
        }
      }
    },
    plugins: prevClosePlugin ? [prevClosePlugin] : [],
  });
}

/** Update one chart card after a period change */
function updateSingleChartCard(ind, i, history, lastTradeDate, changePercent, current, change, previousClose) {
  const period = chartPeriods[ind.symbol];
  const card   = document.getElementById(`chart-${ind.symbol}`);
  if (!card) return;

  // Update background color based on period
  card.style.setProperty('background', getCardBg(period.range), 'important');

  // Build title with optional date suffix for 1d
  const dateSuffix  = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel  = dateSuffix ? escapeHtml(dateSuffix) : '';

  // Update title text
  const titleEl = card.querySelector('.chart-card__title');
  if (titleEl) {
    titleEl.innerHTML = `${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}`;
  }

  // Update price info
  const priceInfoEl = card.querySelector('.chart-card__price-info');
  if (priceInfoEl) {
    const currentEl = priceInfoEl.querySelector('.chart-card__current');
    const changeEl  = priceInfoEl.querySelector('.chart-card__change');
    if (currentEl) currentEl.textContent = current != null ? formatValue(current, ind.unit) : '';
    if (changeEl) {
      changeEl.className = `chart-card__change ${changeClass(changePercent)}`;
      changeEl.textContent = formatChangeText(change, changePercent, ind.unit);
    }
  }

  // Update stats
  const statsEl = card.querySelector('.chart-stats');
  if (statsEl) {
    const stats = calcChartStats(history, ind.unit);
    statsEl.outerHTML = renderChartStatsHTML(stats, ind.unit, ind.name);
  }

  // Update aria-pressed on period buttons
  card.querySelectorAll('.btn-chart-period').forEach(btn => {
    btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
  });

  // Destroy old chart instance
  if (charts[ind.symbol]) {
    charts[ind.symbol].destroy();
    delete charts[ind.symbol];
  }

  // Replace canvas (Chart.js needs a fresh canvas)
  const wrapper = document.getElementById(`chart-canvas-${i}`);
  if (wrapper) {
    wrapper.innerHTML = `<canvas id="chart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>`;
  }

  // Redraw
  drawChart(ind, i, history, changePercent, previousClose);
}

// ─────────────────────────────────────────────
//  Per-chart period button listeners
// ─────────────────────────────────────────────
function attachChartPeriodListeners() {
  document.querySelectorAll('.btn-chart-period').forEach(btn => {
    btn.addEventListener('click', () => {
      const symbol   = btn.dataset.symbol;
      const range    = btn.dataset.range;
      const interval = btn.dataset.interval;
      const label    = btn.dataset.label;
      const idx      = parseInt(btn.dataset.idx, 10);

      const ind = INDICATORS.find(i => i.symbol === symbol);
      if (!ind) return;

      // No-op if already selected
      if (chartPeriods[symbol].range === range) return;

      // Update period state
      chartPeriods[symbol] = { range, interval, label };

      // Fetch data for this symbol only
      fetchSingleChart(ind, idx);
    });
  });
}

// ─────────────────────────────────────────────
//  Data Fetching
// ─────────────────────────────────────────────

/** Fetch data for a single chart (period change) */
async function fetchSingleChart(ind, idx) {
  const period = chartPeriods[ind.symbol];
  const url = `/api/market?symbols=${encodeURIComponent(ind.symbol)}&range=${period.range}&interval=${period.interval}`;

  // Optimistic: update aria-pressed immediately
  const card = document.getElementById(`chart-${ind.symbol}`);
  if (card) {
    // Update background color optimistically
    card.style.setProperty('background', getCardBg(period.range), 'important');
    card.querySelectorAll('.btn-chart-period').forEach(btn => {
      btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
      btn.disabled = true;
    });
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d    = json.data?.[ind.symbol];
    updateSingleChartCard(ind, idx, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change, d?.previousClose);
  } catch (err) {
    console.error(`fetchSingleChart error [${ind.symbol}]:`, err);
    // Restore buttons on error
    if (card) {
      card.querySelectorAll('.btn-chart-period').forEach(btn => btn.disabled = false);
    }
  } finally {
    if (card) {
      card.querySelectorAll('.btn-chart-period').forEach(btn => btn.disabled = false);
    }
  }
}
async function fetchData() {
  if (isLoading) return;
  isLoading = true;

  const btn  = document.getElementById('btn-refresh');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.outerHTML = `<span id="refresh-icon" class="spinner" aria-hidden="true"></span>`;

  try {
    // Group symbols by period
    const groups = new Map(); // "range|interval" → { period, symbols[] }
    INDICATORS.forEach(ind => {
      const p   = chartPeriods[ind.symbol];
      const key = `${p.range}|${p.interval}`;
      if (!groups.has(key)) groups.set(key, { period: p, symbols: [] });
      groups.get(key).symbols.push(ind.symbol);
    });

    // Fetch each group and merge results
    const allData = {};
    let latestUpdatedAt = null;

    // investor API도 병렬로 fetch
    const investorFetchPromise = fetch('/api/investor').then(r => r.json()).catch(() => null);

    for (const [, group] of groups) {
      const { period, symbols } = group;
      const url = `/api/market?symbols=${encodeURIComponent(symbols.join(','))}&range=${period.range}&interval=${period.interval}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      Object.assign(allData, json.data);
      latestUpdatedAt = json.updatedAt;
    }

    // investor 결과 반영
    const inv = await investorFetchPromise;
    if (inv && (inv.kospi || inv.kosdaq)) {
      investorData = inv;
    }

    document.getElementById('error-banner').classList.add('hidden');

    // Always render KPI from fetched data (changePercent is always "전일 대비")
    renderKPICards(allData);
    renderCharts(allData);

    const ts = formatDate(latestUpdatedAt);
    document.getElementById('last-updated').textContent = `업데이트: ${ts}`;
  } catch (err) {
    console.error('fetchData error:', err);
    document.getElementById('error-banner').classList.remove('hidden');
    document.getElementById('last-updated').textContent = '데이터 로드 실패';
  } finally {
    isLoading = false;
    const btnAfter  = document.getElementById('btn-refresh');
    btnAfter.disabled = false;
    const spinnerEl = document.getElementById('refresh-icon');
    if (spinnerEl && spinnerEl.classList.contains('spinner')) {
      spinnerEl.outerHTML = `<span id="refresh-icon" aria-hidden="true">⟳</span>`;
    }
  }
}

      </div>
      ${renderChartStatsHTML(stats, ind.unit, ind.name)}
      <div class="chart-canvas-wrapper" id="schart-canvas-${i}">
        <canvas id="schart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>
      </div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  개별종목 — Draw Chart
// ─────────────────────────────────────────────
function drawStocksChart(ind, i, history, changePercent, previousClose) {
  const period  = stockChartPeriods[ind.symbol];
  const wrapper = document.getElementById(`schart-canvas-${i}`);
  const canvas  = document.getElementById(`schart-${i}`);
  if (!wrapper && !canvas) return;

  if (history.length === 0) {
    const emptyHtml = `
      <div class="chart-empty-state" role="status" aria-label="${escapeHtml(ind.name)} 데이터 없음">
        <span class="chart-empty-state__icon" aria-hidden="true">📭</span>
        <p class="chart-empty-state__title">데이터 없음</p>
        <p class="chart-empty-state__hint">거래 데이터를 가져오지 못했습니다</p>
      </div>`;
    if (wrapper) wrapper.innerHTML = emptyHtml;
    return;
  }

  const labels = history.map(h => {
    if ((period.range === '1d' || period.range === '5d') && h.date.includes('T')) {
      const dt = new Date(h.date);
      if (period.range === "5d") return `${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
      return dt.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit", hour12: false });
    }
    if (period.range === '10y') {
      const parts = h.date.split('-');
      return `${parts[0]}/${parseInt(parts[1])}`;
    }
    const parts = h.date.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const values = history.map(h => h.close);
  const color  = changePercent > 0 ? '#f97316' : changePercent < 0 ? '#38bdf8' : '#e2e8f0';
  const ctx    = canvas.getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, color + '33');
  gradient.addColorStop(1, color + '00');

  const prevClosePlugin = previousClose != null ? {
    id: 'prevCloseLine',
    afterDraw(chart) {
      const yScale = chart.scales.y;
      const y = yScale.getPixelForValue(previousClose);
      if (y < yScale.top || y > yScale.bottom) return;
      const ctx = chart.ctx;
      ctx.save();
      ctx.beginPath();
      ctx.setLineDash([]);
      ctx.strokeStyle = getChartTheme().prevCloseLine;
      ctx.lineWidth = 1;
      ctx.moveTo(chart.chartArea.left, y);
      ctx.lineTo(chart.chartArea.right, y);
      ctx.stroke();
      ctx.restore();
    }
  } : null;

  stockCharts[ind.symbol] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: ind.name,
        data: values,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? false : { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: getChartTheme().tooltipBg,
          borderColor: getChartTheme().tooltipBorder,
          borderWidth: 1,
          titleColor: getChartTheme().tooltipTitle,
          bodyColor: getChartTheme().tooltipBody,
          callbacks: {
            label: ctx => ` ${formatValue(ctx.parsed.y, ind.unit)} ${ind.unit}`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: getChartTheme().gridColor },
          ticks: { color: getChartTheme().tickColor, maxTicksLimit: 6, font: { size: 11 } }
        },
        y: {
          ...(previousClose != null && values.length > 0 ? {
            suggestedMin: Math.min(previousClose, Math.min(...values)),
            suggestedMax: Math.max(previousClose, Math.max(...values)),
          } : {}),
          grid: { color: getChartTheme().gridColor },
          ticks: { color: getChartTheme().tickColor, font: { size: 11 }, callback: v => ind.unit === '%' ? v.toFixed(2) : Math.round(v).toLocaleString('ko-KR') }
        }
      }
    },
    plugins: prevClosePlugin ? [prevClosePlugin] : [],
  });
}

// ─────────────────────────────────────────────
//  개별종목 — Render Charts Grid
// ─────────────────────────────────────────────
function renderStocksCharts(data) {
  lastStocksData = data;
  const grid = document.getElementById('stocks-charts-grid');
  Object.values(stockCharts).forEach(c => c.destroy());
  stockCharts = {};

  grid.innerHTML = STOCKS.map((ind, i) => {
    const d = data[ind.symbol];
    return buildStocksChartCardHTML(ind, i, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change);
  }).join('');

  STOCKS.forEach((ind, i) => {
    drawStocksChart(ind, i, data[ind.symbol]?.history || [], data[ind.symbol]?.changePercent, data[ind.symbol]?.previousClose);
  });

  attachStocksChartPeriodListeners();
}

// ─────────────────────────────────────────────
//  개별종목 — Update Single Chart Card (period change)
// ─────────────────────────────────────────────
function updateSingleStocksChartCard(ind, i, history, lastTradeDate, changePercent, current, change, previousClose) {
  const period = stockChartPeriods[ind.symbol];
  const card   = document.getElementById(`chart-${ind.symbol}`);
  if (!card) return;

  card.style.setProperty('background', getCardBg(period.range), 'important');

  const dateSuffix = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel = dateSuffix ? escapeHtml(dateSuffix) : '';

  const titleEl = card.querySelector('.chart-card__title');
  if (titleEl) {
    titleEl.innerHTML = `${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}`;
  }

  const priceInfoEl = card.querySelector('.chart-card__price-info');
  if (priceInfoEl) {
    const currentEl = priceInfoEl.querySelector('.chart-card__current');
    const changeEl  = priceInfoEl.querySelector('.chart-card__change');
    if (currentEl) currentEl.textContent = current != null ? formatValue(current, ind.unit) : '';
    if (changeEl) {
      changeEl.className = `chart-card__change ${changeClass(changePercent)}`;
      changeEl.textContent = formatChangeText(change, changePercent, ind.unit);
    }
  }

  const statsEl = card.querySelector('.chart-stats');
  if (statsEl) {
    const stats = calcChartStats(history, ind.unit);
    statsEl.outerHTML = renderChartStatsHTML(stats, ind.unit, ind.name);
  }

  card.querySelectorAll('.btn-stocks-period').forEach(btn => {
    btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
  });

  if (stockCharts[ind.symbol]) {
    stockCharts[ind.symbol].destroy();
    delete stockCharts[ind.symbol];
  }

  const wrapper = document.getElementById(`schart-canvas-${i}`);
  if (wrapper) {
    wrapper.innerHTML = `<canvas id="schart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>`;
  }

  drawStocksChart(ind, i, history, changePercent, previousClose);
}

// ─────────────────────────────────────────────
//  개별종목 — Period Button Listeners
// ─────────────────────────────────────────────
function attachStocksChartPeriodListeners() {
  document.querySelectorAll('.btn-stocks-period').forEach(btn => {
    btn.addEventListener('click', () => {
      const symbol   = btn.dataset.symbol;
      const range    = btn.dataset.range;
      const interval = btn.dataset.interval;
      const label    = btn.dataset.label;
      const idx      = parseInt(btn.dataset.idx, 10);

      const ind = STOCKS.find(s => s.symbol === symbol);
      if (!ind) return;
      if (stockChartPeriods[symbol].range === range) return;

      stockChartPeriods[symbol] = { range, interval, label };
      fetchSingleStocksChart(ind, idx);
    });
  });
}

// ─────────────────────────────────────────────
//  개별종목 — Fetch Single Chart (period change)
// ─────────────────────────────────────────────
async function fetchSingleStocksChart(ind, idx) {
  const period = stockChartPeriods[ind.symbol];
  const url = `/api/market?symbols=${encodeURIComponent(ind.symbol)}&range=${period.range}&interval=${period.interval}`;

  const card = document.getElementById(`chart-${ind.symbol}`);
  if (card) {
    card.style.setProperty('background', getCardBg(period.range), 'important');
    card.querySelectorAll('.btn-stocks-period').forEach(btn => {
      btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
      btn.disabled = true;
    });
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d    = json.data?.[ind.symbol];
    updateSingleStocksChartCard(ind, idx, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change, d?.previousClose);
  } catch (err) {
    console.error(`fetchSingleStocksChart error [${ind.symbol}]:`, err);
  } finally {
    if (card) {
      card.querySelectorAll('.btn-stocks-period').forEach(btn => btn.disabled = false);
    }
  }
}

// ─────────────────────────────────────────────
//  개별종목 — Fetch All
// ─────────────────────────────────────────────
async function fetchStocksData() {
  if (isStocksLoading) return;
  isStocksLoading = true;

  renderStocksSkeletons();
  try {
    const groups = new Map();
    STOCKS.forEach(ind => {
      const p   = stockChartPeriods[ind.symbol];
      const key = `${p.range}|${p.interval}`;
      if (!groups.has(key)) groups.set(key, { period: p, symbols: [] });
      groups.get(key).symbols.push(ind.symbol);
    });

    const allData = {};
    for (const [, group] of groups) {
      const { period, symbols } = group;
      const url = `/api/market?symbols=${encodeURIComponent(symbols.join(','))}&range=${period.range}&interval=${period.interval}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      Object.assign(allData, json.data);
    }

    renderStocksCharts(allData);
  } catch (err) {
    console.error('fetchStocksData error:', err);
  } finally {
    isStocksLoading = false;
  }
}

// ─────────────────────────────────────────────
//  Date label helper for 1d chart title
// ─────────────────────────────────────────────
function formatLastTradeDateSuffix(lastTradeDate) {
  if (!lastTradeDate) return '';
  const todayUTC = new Date().toISOString().split('T')[0];
  if (lastTradeDate === todayUTC) return '';
  // Parse as UTC noon to avoid local TZ shifts
  const d = new Date(lastTradeDate + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return ` (${month}/${day} ${dow})`;
}

// ─────────────────────────────────────────────
//  Date label helper for KPI previousCloseDate
// ─────────────────────────────────────────────
function formatPrevCloseDate(dateStr) {
  if (!dateStr) return null;
  // Parse as UTC noon to avoid local TZ shifts
  const d = new Date(dateStr + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return `${month}/${day} ${dow}`;
}

// ─────────────────────────────────────────────
//  Date label helper for lastMarketDate
//  Returns "3/13(금) 기준" if not today, "실시간" if today
// ─────────────────────────────────────────────
function formatLastMarketDateLabel(dateStr) {
  if (!dateStr) return null;
  // Today's date in UTC (YYYY-MM-DD)
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  if (dateStr === todayStr) return '실시간';
  // Format as "3/13(금) 기준"
  const d = new Date(dateStr + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return `${month}/${day}(${dow}) 기준`;
}

// ─────────────────────────────────────────────
//  종목 추가 / 삭제
// ─────────────────────────────────────────────
function getStockMeta(exchange) {
  if (!exchange) return { unit: '' };
  const ex = exchange.toUpperCase();
  // KOSPI, KOSDAQ, KSE, Korea, KRX 등 한국 주식 모두 인식
  if (
    ex === 'KOSPI' || ex === 'KOSDAQ' || ex === 'KSE' ||
    ex.includes('KOS') || ex.includes('KSC') || ex.includes('KOE') ||
    ex.includes('KRX') || ex.includes('KOREA')
  ) {
    return { unit: '원' };
  }
  if (['NYQ','NYS','NAS','PCX','NGM','NCM','ASE'].some(e => ex.includes(e))) {
    return { unit: 'USD' };
  }
  return { unit: '' };
}

async function addStock(result) {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('stock-search-input').value = '';
  if (STOCKS.find(s => s.symbol === result.symbol)) {
    const card = document.getElementById(`chart-${result.symbol}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  const { unit } = getStockMeta(result.exchange);
  const newStock = { symbol: result.symbol, name: result.name, unit };
  STOCKS.push(newStock);
  stockChartPeriods[newStock.symbol] = { ...PERIOD_OPTIONS[0] };
  saveStocks();
  fetchStocksData();
}

function removeStock(symbol) {
  if (stockCharts[symbol]) {
    stockCharts[symbol].destroy();
    delete stockCharts[symbol];
  }
  const idx = STOCKS.findIndex(s => s.symbol === symbol);
  if (idx !== -1) STOCKS.splice(idx, 1);
  delete stockChartPeriods[symbol];
  saveStocks();
  if (STOCKS.length === 0) {
    Object.values(stockCharts).forEach(c => c.destroy());
    stockCharts = {};
    document.getElementById('stocks-charts-grid').innerHTML = '';
    return;
  }
  fetchStocksData();
}

// ─────────────────────────────────────────────
//  종목 검색 — 한글: KRX 전 종목, 영문: Yahoo Finance + KRX 병행
// ─────────────────────────────────────────────
async function searchStocks(query) {
  const q = query.trim();
  const resultsEl = document.getElementById('search-results');
  if (!q) {
    resultsEl.style.display = 'none';
    return;
  }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="padding:1rem;color:var(--text-muted);">검색 중...</div>';

  const isKorean = /[가-힣]/.test(q);

  let results = [];
  try {
    if (isKorean) {
      // 한글 → KRX 전 종목 검색
      const res = await fetch(`/api/kr-search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      results = data.results || [];
    } else {
      // 영문 → Yahoo Finance + KRX 병행
      const [yahooRes, krxRes] = await Promise.allSettled([
        fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()),
        fetch(`/api/kr-search?q=${encodeURIComponent(q)}`).then(r => r.json()),
      ]);

      const seen = new Set();
      const merged = [];
      // KRX 결과 먼저
      if (krxRes.status === 'fulfilled') {
        for (const r of (krxRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      // Yahoo 결과
      if (yahooRes.status === 'fulfilled') {
        for (const r of (yahooRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      results = merged;
    }
  } catch (err) {
    console.error('Search error:', err);
  }

  renderSearchResults(results);
}

// ─────────────────────────────────────────────
//  XSS helper
// ─────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

//  Skin Management
// ─────────────────────────────────────────────
function applySkin(skin) {
  if (skin === 'white') {
    document.documentElement.setAttribute('data-skin', 'white');
  } else {
    document.documentElement.removeAttribute('data-skin');
  }
  const icon  = document.getElementById('skin-icon');
  const label = document.getElementById('skin-label');
  if (icon && label) {
    icon.textContent  = skin === 'white' ? '☀️' : '🌙';
    label.textContent = skin === 'white' ? 'White' : 'Black';
  }
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) {
    meta.setAttribute('content', skin === 'white' ? '#f1f5f9' : '#0f172a');
  }
  localStorage.setItem('stock-skin', skin);
}

function initSkin() {
  const saved = localStorage.getItem('stock-skin') || 'black';
  applySkin(saved);
}

function refreshAllCharts() {
  if (activeTab === 'main') {
    if (lastIndicatorData) renderCharts(lastIndicatorData);
  } else {
    if (lastStocksData) renderStocksCharts(lastStocksData);
  }
}

function toggleSkin() {
  const current = localStorage.getItem('stock-skin') || 'black';
  const next    = current === 'black' ? 'white' : 'black';
  applySkin(next);
  refreshAllCharts();
}

document.getElementById('btn-skin').addEventListener('click', toggleSkin);

// ─────────────────────────────────────────────
//  거래내역 — Data Management
// ─────────────────────────────────────────────
function loadTrades() {
  try {
    return JSON.parse(localStorage.getItem('stock-trades') || '[]');
  } catch { return []; }
}

function saveTrades(trades) {
  localStorage.setItem('stock-trades', JSON.stringify(trades));
}

function addTrade(trade) {
  const trades = loadTrades();
  trade.id = Date.now().toString();
  trade.createdAt = new Date().toISOString();
  trade.amount = trade.price * trade.qty;
  trades.unshift(trade); // 최신이 위
  saveTrades(trades);
  renderTrades();
}

function deleteTrade(id) {
  let trades = loadTrades();
  trades = trades.filter(t => t.id !== id);
  saveTrades(trades);
  renderTrades();
}

// ─────────────────────────────────────────────
//  거래내역 — Rendering
// ─────────────────────────────────────────────
function renderTrades() {
  const trades = loadTrades();
  const filter = document.getElementById('trade-filter-type').value;
  const filtered = filter === 'all' ? trades : trades.filter(t => t.type === filter);

  const listEl = document.getElementById('trade-list');

  if (filtered.length === 0) {
    listEl.innerHTML = '<p class="trade-list__empty">거래내역이 없습니다.</p>';
    document.getElementById('trade-summary').style.display = 'none';
    return;
  }

  listEl.innerHTML = filtered.map(t => {
    const date = new Date(t.date);
    const dateStr = date.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit' });
    const timeStr = date.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    const badgeClass = t.type === 'buy' ? 'trade-item__badge--buy' : 'trade-item__badge--sell';
    const typeLabel = t.type === 'buy' ? '매수' : '매도';
    const amount = (t.price * t.qty).toLocaleString('ko-KR');
    const feeStr = t.fee ? ` · 수수료 ${t.fee.toLocaleString('ko-KR')}원` : '';
    const brokerStr = t.broker ? ` · ${escapeHtml(t.broker)}` : '';
    const memoStr = t.memo ? ` · ${escapeHtml(t.memo)}` : '';

    return `
      <div class="trade-item" data-id="${escapeHtml(t.id)}">
        <div class="trade-item__left">
          <div class="trade-item__top">
            <span class="trade-item__badge ${badgeClass}">${typeLabel}</span>
            <span class="trade-item__stock">${escapeHtml(t.stock)}</span>
          </div>
          <div class="trade-item__detail">
            ${dateStr} ${timeStr} · ${t.price.toLocaleString('ko-KR')}원 × ${t.qty.toLocaleString('ko-KR')}주${feeStr}${brokerStr}${memoStr}
          </div>
        </div>
        <div class="trade-item__right">
          <div class="trade-item__amount">${amount}원</div>
          <div class="trade-item__actions">
            <button class="btn-trade-delete" data-id="${escapeHtml(t.id)}">삭제</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // 요약 표시
  renderTradeSummary(trades);
  renderPortfolio(trades);
}

function renderTradeSummary(trades) {
  if (trades.length === 0) {
    document.getElementById('trade-summary').style.display = 'none';
    return;
  }
  document.getElementById('trade-summary').style.display = '';

  const totalBuy = trades.filter(t => t.type === 'buy').reduce((s, t) => s + t.price * t.qty, 0);
  const totalSell = trades.filter(t => t.type === 'sell').reduce((s, t) => s + t.price * t.qty, 0);
  const totalFee = trades.reduce((s, t) => s + (t.fee || 0), 0);
  const totalTrades = trades.length;

  const holdings = calculatePortfolio(trades);
  const totalInvested = holdings.reduce((s, h) => s + h.investedAmount, 0);
  const holdingCount = holdings.length;

  document.getElementById('trade-summary-grid').innerHTML = `
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">총 매수금액</div>
      <div class="trade-summary-card__value" style="color:var(--positive)">${totalBuy.toLocaleString('ko-KR')}원</div>
    </div>
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">총 매도금액</div>
      <div class="trade-summary-card__value" style="color:var(--negative)">${totalSell.toLocaleString('ko-KR')}원</div>
    </div>
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">총 수수료</div>
      <div class="trade-summary-card__value">${totalFee.toLocaleString('ko-KR')}원</div>
    </div>
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">총 거래건수</div>
      <div class="trade-summary-card__value">${totalTrades}건</div>
    </div>
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">총 투자금액 (보유)</div>
      <div class="trade-summary-card__value">${totalInvested.toLocaleString('ko-KR')}원</div>
    </div>
    <div class="trade-summary-card">
      <div class="trade-summary-card__label">보유종목</div>
      <div class="trade-summary-card__value">${holdingCount}종목</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  거래내역 — Portfolio Calculation
// ─────────────────────────────────────────────
function calculatePortfolio(trades) {
  const portfolio = {};

  for (const t of trades) {
    if (!portfolio[t.stock]) {
      portfolio[t.stock] = {
        totalBuyQty: 0, totalBuyAmount: 0,
        totalSellQty: 0, totalSellAmount: 0,
        totalFee: 0, symbol: t.symbol || '', brokers: new Set()
      };
    }
    const p = portfolio[t.stock];
    if (t.type === 'buy') {
      p.totalBuyQty += t.qty;
      p.totalBuyAmount += t.price * t.qty;
    } else {
      p.totalSellQty += t.qty;
      p.totalSellAmount += t.price * t.qty;
    }
    p.totalFee += (t.fee || 0);
    if (t.broker) p.brokers.add(t.broker);
  }

  const holdings = [];
  for (const [name, p] of Object.entries(portfolio)) {
    const holdingQty = p.totalBuyQty - p.totalSellQty;
    if (holdingQty > 0) {
      const avgPrice = Math.round(p.totalBuyAmount / p.totalBuyQty);
      const investedAmount = avgPrice * holdingQty;
      const realizedPL = p.totalSellAmount - (p.totalBuyAmount / p.totalBuyQty * p.totalSellQty) - p.totalFee;
      holdings.push({
        name,
        symbol: p.symbol,
        holdingQty,
        avgPrice,
        investedAmount,
        totalFee: p.totalFee,
        brokers: [...p.brokers],
        realizedPL: Math.round(p.totalSellQty > 0 ? realizedPL : 0),
      });
    }
  }
  return holdings;
}

function renderPortfolio(trades) {
  const holdings = calculatePortfolio(trades);
  const section = document.getElementById('trade-portfolio');
  const grid = document.getElementById('trade-portfolio-grid');

  if (holdings.length === 0) {
    section.style.display = 'none';
    return;
  }

  section.style.display = '';
  grid.innerHTML = holdings.map(h => {
    const brokerStr = h.brokers.length > 0 ? h.brokers.join(', ') : '';
    const brokerHtml = brokerStr ? ` · ${escapeHtml(brokerStr)}` : '';
    return `
      <div class="portfolio-item">
        <div class="portfolio-item__left">
          <div class="portfolio-item__name">${escapeHtml(h.name)}</div>
          <div class="portfolio-item__detail">
            평단 ${h.avgPrice.toLocaleString('ko-KR')}원${brokerHtml}
          </div>
        </div>
        <div class="portfolio-item__right">
          <div class="portfolio-item__value">${h.investedAmount.toLocaleString('ko-KR')}원</div>
          <div class="portfolio-item__qty">${h.holdingQty.toLocaleString('ko-KR')}주 보유</div>
        </div>
      </div>
    `;
  }).join('');
}

// ─────────────────────────────────────────────
//  거래내역 — Trade Stock Autocomplete
// ─────────────────────────────────────────────
let _tradeSearchTimer = null;
document.getElementById('trade-stock').addEventListener('input', e => {
  clearTimeout(_tradeSearchTimer);
  const q = e.target.value.trim();
  document.getElementById('trade-symbol').value = '';
  if (q.length >= 1) {
    _tradeSearchTimer = setTimeout(() => searchTradeStock(q), 300);
  } else {
    document.getElementById('trade-search-results').style.display = 'none';
  }
});

async function searchTradeStock(query) {
  const q = query.trim();
  const resultsEl = document.getElementById('trade-search-results');
  if (!q) { resultsEl.style.display = 'none'; return; }

  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="padding:0.5rem;color:var(--text-muted);font-size:0.85rem;">검색 중...</div>';

  const isKorean = /[가-힣]/.test(q);
  let results = [];
  try {
    if (isKorean) {
      const res = await fetch(`/api/kr-search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      results = data.results || [];
    } else {
      const [yahooRes, krxRes] = await Promise.allSettled([
        fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()),
        fetch(`/api/kr-search?q=${encodeURIComponent(q)}`).then(r => r.json()),
      ]);
      const seen = new Set();
      const merged = [];
      if (krxRes.status === 'fulfilled') {
        for (const r of (krxRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      if (yahooRes.status === 'fulfilled') {
        for (const r of (yahooRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      results = merged;
    }
  } catch (err) { console.error('Trade search error:', err); }

  if (results.length === 0) {
    resultsEl.innerHTML = '<div style="padding:0.5rem;color:var(--text-muted);font-size:0.85rem;">결과 없음</div>';
    return;
  }

  resultsEl.innerHTML = results.slice(0, 10).map(r => `
    <div class="search-result-item" data-symbol="${escapeHtml(r.symbol)}" data-name="${escapeHtml(r.name)}">
      <strong>${escapeHtml(r.name)}</strong> <span style="color:var(--text-muted);font-size:0.8rem;">${escapeHtml(r.symbol)}</span>
    </div>
  `).join('');

  resultsEl.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      document.getElementById('trade-stock').value = item.dataset.name;
      document.getElementById('trade-symbol').value = item.dataset.symbol;
      resultsEl.style.display = 'none';
    });
  });
}

// 외부 클릭 시 trade 검색 결과 닫기
document.addEventListener('click', e => {
  if (!e.target.closest('#trade-stock') && !e.target.closest('#trade-search-results')) {
    const el = document.getElementById('trade-search-results');
    if (el) el.style.display = 'none';
  }
});

// ─────────────────────────────────────────────
//  거래내역 — Form Handlers
// ─────────────────────────────────────────────
function updateAmountPreview() {
  const price = parseInt((document.getElementById('trade-price').value || '0').replace(/,/g, '')) || 0;
  const qty = parseInt((document.getElementById('trade-qty').value || '0').replace(/,/g, '')) || 0;
  const amount = price * qty;
  document.getElementById('trade-amount-preview').textContent =
    amount > 0 ? `금액: ${amount.toLocaleString('ko-KR')}원` : '금액: ―';
}

function formatTradeInput(input) {
  input.addEventListener('input', () => {
    const raw = input.value.replace(/[^0-9]/g, '');
    input.value = raw ? parseInt(raw).toLocaleString('ko-KR') : '';
    updateAmountPreview();
  });
}

function setDefaultTradeDate() {
  const now = new Date();
  const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
  const iso = kst.toISOString().slice(0, 16);
  document.getElementById('trade-date').value = iso;
}

document.getElementById('trade-form').addEventListener('submit', e => {
  e.preventDefault();
  const trade = {
    date: document.getElementById('trade-date').value,
    type: document.getElementById('trade-type').value,
    stock: document.getElementById('trade-stock').value.trim(),
    symbol: document.getElementById('trade-symbol').value,
    price: parseInt(document.getElementById('trade-price').value.replace(/,/g, '')) || 0,
    qty: parseInt(document.getElementById('trade-qty').value.replace(/,/g, '')) || 0,
    fee: parseInt((document.getElementById('trade-fee').value || '0').replace(/,/g, '')) || 0,
    broker: document.getElementById('trade-broker').value,
    memo: document.getElementById('trade-memo').value.trim(),
  };

  if (!trade.date || !trade.stock || trade.price <= 0 || trade.qty <= 0) {
    alert('거래일시, 종목명, 단가, 수량을 모두 입력해주세요.');
    return;
  }

  addTrade(trade);

  // 폼 초기화
  document.getElementById('trade-form').reset();
  document.getElementById('trade-amount-preview').textContent = '금액: ―';
  setDefaultTradeDate();
});

// 삭제 버튼 (이벤트 위임)
document.getElementById('trade-list').addEventListener('click', e => {
  const btn = e.target.closest('.btn-trade-delete');
  if (!btn) return;
  const id = btn.dataset.id;
  if (confirm('이 거래내역을 삭제하시겠습니까?')) {
    deleteTrade(id);
  }
});

// 필터 변경
document.getElementById('trade-filter-type').addEventListener('change', renderTrades);

// 초기화
formatTradeInput(document.getElementById('trade-price'));
formatTradeInput(document.getElementById('trade-qty'));
formatTradeInput(document.getElementById('trade-fee'));
setDefaultTradeDate();
renderTrades();

//  Init
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  Dynamic header height → scroll-margin-top
//  Recalculates whenever the header reflows (resize / orientation change)
// ─────────────────────────────────────────────
function updateScrollMargin() {
  const header = document.querySelector('.dashboard-header');
  const tabBar = document.querySelector('.tab-bar');
  if (!header) return;
  document.documentElement.style.setProperty('--header-height', header.offsetHeight + 'px');
  if (tabBar) document.documentElement.style.setProperty('--tab-bar-height', tabBar.offsetHeight + 'px');
}
window.addEventListener('resize', updateScrollMargin);
updateScrollMargin();

renderSkeletons();
fetchData();
startAutoRefresh();
initSkin();
</script>
