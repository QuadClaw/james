<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>주식투자 - JamesClaw</title>
  <link rel="icon" type="image/png" href="https://openclaw.ai/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="https://openclaw.ai/apple-touch-icon.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1" integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ" crossorigin="anonymous"></script>

  <style>
    /* ===== Reset ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page:   #0f172a;
      --bg-card:   #1e293b;
      --bg-header: #0f172a;
      --border:    #334155;
      --text:      #f8fafc;
      --text-muted:#94a3b8;
      --positive:  #22c55e;
      --negative:  #ef4444;
      --neutral:   #6b7280;
      --accent:    #38bdf8;
      --radius:    12px;
      --gap:       16px;
      --header-height: 70px;

      /* Chart line colors per indicator */
      --c0: #38bdf8;
      --c1: #f59e0b;
      --c2: #22c55e;
      --c3: #a78bfa;
      --c4: #fb923c;
    }

    html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }

    body {
      background: var(--bg-page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      min-height: 100vh;
      line-height: 1.5;
      overscroll-behavior: none;
    }

    /* ===== Skip Link ===== */
    .skip-link {
      position: absolute;
      top: -100%;
      left: 1rem;
      z-index: 999;
      background: var(--accent);
      color: #0f172a;
      padding: 0.5rem 1rem;
      border-radius: 0 0 8px 8px;
      font-weight: 600;
      text-decoration: none;
      transition: top 150ms ease;
    }
    .skip-link:focus { top: 0; }

    /* ===== Layout ===== */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 var(--gap) 3rem;
    }

    /* ===== Header ===== */
    .dashboard-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      padding: 1.25rem var(--gap);
      background: #0d1829;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .header-left h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    #last-updated {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    #auto-refresh-label {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .btn-refresh {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.45rem 1rem;
      background: #1e3a5f;
      color: var(--accent);
      border: 1px solid #2563eb44;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 180ms ease, transform 100ms ease;
      min-height: 44px;
      min-width: 44px;
    }
    .btn-refresh:hover { background: #1e4a7f; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-refresh:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ===== Home Button ===== */
    .btn-home {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0.45rem 0.9rem;
      background: rgba(255,255,255,0.07);
      color: var(--text-muted);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 180ms ease, color 180ms ease, border-color 180ms ease;
      min-height: 36px;
      white-space: nowrap;
      order: 10;
      margin-left: 8px;
    }
    .btn-home:hover {
      background: rgba(255,255,255,0.14);
      color: var(--text);
      border-color: rgba(255,255,255,0.28);
    }
    .btn-home:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    .btn-home .home-label { display: inline; }
    @media (max-width: 600px) {
      /* ── Mobile header: compact two-row layout ── */
      .dashboard-header {
        flex-direction: column;
        align-items: stretch;
        gap: 6px;
        padding: 0.6rem var(--gap);
        /* safe-area for Telegram in-app browser / notched iPhones */
        padding-top: calc(0.6rem + env(safe-area-inset-top, 0px));
        /* ensures btn-home can be absolutely positioned within */
        position: sticky;
      }
      .header-left {
        display: flex;
        align-items: center;
      }
      .header-left h1 {
        font-size: 1.1rem;
      }
      .header-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: nowrap;
        font-size: 0.72rem;
        /* leave right-side space so btn-refresh doesn't overlap home btn */
        padding-right: 0;
      }
      /* Home button pinned to top-right corner of header */
      .btn-home {
        position: absolute;
        top: calc(0.5rem + env(safe-area-inset-top, 0px));
        right: var(--gap);
        margin-left: 0;
        order: unset;
        min-height: 36px;
        padding: 0.45rem 0.65rem;
        font-size: 0.78rem;
      }
      .btn-home .home-label { display: none; }
      #last-updated      { font-size: 0.72rem; }
      #auto-refresh-label { font-size: 0.72rem; }
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--accent);
      border-top-color: transparent;
      border-radius: 50%;
    }
    @media (prefers-reduced-motion: no-preference) {
      .spinner { animation: spin 0.7s linear infinite; }
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== KPI Grid ===== */
    .kpi-section {
      margin-top: 1.5rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .kpi-grid { grid-template-columns: 1fr; }
    }

    /* ===== KPI Card ===== */
    .kpi-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-height: 140px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      scroll-margin-top: calc(var(--header-height) + var(--tab-bar-height, 44px) + 16px);
    }
    .kpi-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }
    .kpi-card:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .kpi-card__source {
      font-size: 0.75rem;
      color: #9ca3af;
      margin-top: auto;
      padding-top: 8px;
      display: block;
    }

    .kpi-card__label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .kpi-card__value {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    .kpi-card__change {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .kpi-card__change.up   { color: var(--positive); }
    .kpi-card__change.down { color: var(--negative); }
    .kpi-card__change.flat { color: var(--neutral); }

    .kpi-card__date {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 1px;
      opacity: 0.8;
    }

    .kpi-card__error {
      font-size: 0.82rem;
      color: var(--negative);
      margin-top: auto;
    }

    /* ===== KPI Card with Investors ===== */
    .kpi-card--with-investors {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
    }
    /* 모바일에서도 투자자 데이터를 오른쪽에 유지 */
    .kpi-card__main {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .kpi-card__investors {
      display: flex;
      flex-direction: column;
      gap: 3px;
      font-size: 0.72rem;
      color: var(--text-muted);
      min-width: 90px;
      border-left: 1px solid var(--border);
      padding-left: 10px;
      align-self: center;
    }
    .kpi-card__investor-row {
      display: flex;
      justify-content: space-between;
      gap: 4px;
    }
    .kpi-card__investor-label {
      color: #64748b;
    }
    .kpi-card__investor-value {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }
    .kpi-card__investor-value.up { color: var(--positive); }
    .kpi-card__investor-value.down { color: var(--negative); }

    /* ===== Skeleton ===== */
    .skeleton {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      min-height: 120px;
      overflow: hidden;
      position: relative;
    }

    .skel-line {
      background: #334155;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    @media (prefers-reduced-motion: no-preference) {
      .skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
      @keyframes shimmer {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
    }

    /* ===== Charts Section ===== */
    .charts-section {
      margin-top: 2rem;
    }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: var(--gap);
    }

    @media (max-width: 900px) {
      .charts-grid { grid-template-columns: 1fr; }
    }

    .chart-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      transition: background 0.3s ease, background-color 0.3s ease;
      cursor: pointer;
      scroll-margin-top: calc(var(--header-height) + var(--tab-bar-height, 44px) + 16px);
    }

    /* Chart card header: title + per-chart period toggle */
    .chart-card__header {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 0.5rem;
    }

    .chart-card__header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .chart-card__title {
      font-size: 0.95rem;
      font-weight: 600;
      color: #e2e8f0;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex: 1;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chart-card__price-info {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 0;
      margin: 0;
    }
    .chart-card__current {
      font-size: 1.1rem;
      font-weight: 700;
      color: #f1f5f9;
    }
    .chart-card__change {
      font-size: 0.85rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .chart-card__change.up {
      color: var(--positive);
      background: rgba(34,197,94,0.1);
    }
    .chart-card__change.down {
      color: var(--negative);
      background: rgba(239,68,68,0.1);
    }
    .chart-card__change.flat {
      color: var(--neutral);
    }

    /* Per-chart price stats bar */
    .chart-stats {
      display: flex;
      gap: 0.9rem;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 0.65rem;
      flex-wrap: wrap;
    }

    .stat-current { color: #f8fafc; }
    .stat-high    { color: #22c55e; }
    .stat-low     { color: #ef4444; }

    /* Per-chart period toggle (compact) */
    .chart-period-toggle {
      display: flex;
      gap: 2px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .btn-chart-period {
      padding: 0.2rem 0.55rem;
      border: none;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 600;
      cursor: pointer;
      background: transparent;
      color: var(--text-muted);
      transition: background 150ms ease, color 150ms ease;
      min-height: 26px;
      line-height: 1;
    }

    .btn-chart-period:hover:not([aria-pressed="true"]) {
      background: #334155;
      color: var(--text);
    }

    .btn-chart-period[aria-pressed="true"] {
      background: #3b82f6;
      color: #fff;
    }

    .btn-chart-period:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    .chart-canvas-wrapper canvas {
      max-height: 220px;
    }

    /* skeleton chart */
    .chart-skeleton {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.25rem 1.5rem;
      min-height: 260px;
      overflow: hidden;
      position: relative;
    }
    @media (prefers-reduced-motion: no-preference) {
      .chart-skeleton::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
        animation: shimmer 1.5s infinite;
      }
    }
    .chart-skel-bar {
      background: #334155;
      border-radius: 4px;
    }

    /* ===== Error Banner ===== */
    .error-banner {
      background: #450a0a;
      border: 1px solid #991b1b;
      border-radius: var(--radius);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .error-banner p {
      color: #fca5a5;
      font-size: 0.9rem;
      flex: 1;
    }

    .btn-retry {
      padding: 0.4rem 0.9rem;
      background: #991b1b;
      color: #fca5a5;
      border: 1px solid #dc262644;
      border-radius: 6px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      min-height: 36px;
      white-space: nowrap;
    }
    .btn-retry:hover { background: #7f1d1d; }
    .btn-retry:focus-visible { outline: 2px solid #ef4444; outline-offset: 2px; }

    /* ===== Empty Chart State ===== */
    .chart-empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 180px;
      gap: 0.4rem;
      text-align: center;
      padding: 1.5rem 1rem;
    }
    .chart-empty-state__icon {
      font-size: 2rem;
      opacity: 0.55;
    }
    .chart-empty-state__title {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text-muted);
    }
    .chart-empty-state__hint {
      font-size: 0.76rem;
      color: #475569;
      margin-top: 2px;
    }

    /* hidden */
    .hidden { display: none !important; }

    /* ===== Tab Bar ===== */
    .tab-bar {
      display: flex;
      gap: 0;
      background: #131c2e;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: var(--header-height, 70px);
      z-index: 99;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 0.75rem 1.5rem;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: var(--text-muted);
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: var(--text); }
    .tab-btn.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .tab-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

    /* ===== Stock Search ===== */
    .stock-search {
      padding: 1rem 0;
      position: relative;
    }
    .search-input-wrap {
      display: flex;
      gap: 8px;
    }
    #stock-search-input {
      flex: 1;
      min-width: 0;
      padding: 0.75rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 16px;
      outline: none;
    }
    #stock-search-input:focus {
      border-color: var(--accent);
    }
    #stock-search-input::placeholder {
      color: var(--text-muted);
    }
    .btn-search {
      padding: 0.75rem 1.25rem;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 150ms ease;
    }
    .btn-search:hover { background: #1d4ed8; }
    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 50;
      margin-top: 4px;
    }
    .search-result-item {
      padding: 0.75rem 1rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .search-result-item:hover {
      background: rgba(255,255,255,0.05);
    }
    .search-result-item:last-child {
      border-bottom: none;
    }
    /* Delete stock button */
    .btn-remove-stock {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 0.85rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 4px;
      line-height: 1;
      transition: color 150ms ease, background 150ms ease;
      flex-shrink: 0;
    }
    .btn-remove-stock:hover {
      color: var(--negative);
      background: rgba(239,68,68,0.1);
    }

    @media (max-width: 600px) {
      .chart-card__header-top {
        flex-wrap: wrap;
        gap: 4px;
      }
      .chart-card__title {
        font-size: 0.85rem;
      }
      .chart-card__current {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>

<a href="#main-content" class="skip-link">본문으로 건너뛰기</a>

<!-- ===== Header (global period toggle removed) ===== -->
<header class="dashboard-header" role="banner">
  <div class="header-left">
    <h1>📈 주식투자</h1>
  </div>
  <div class="header-right">
    <a href="index.html" class="btn-home" aria-label="JamesClaw 메인으로 이동">
      🏠 <span class="home-label">JamesClaw</span>
    </a>
    <span id="last-updated" aria-live="polite" aria-atomic="true">—</span>
    <span id="auto-refresh-label" aria-hidden="true">· 30초 자동 갱신</span>
    <button id="btn-refresh" class="btn-refresh" aria-label="데이터 새로고침">
      <span id="refresh-icon">⟳</span>
      <span>새로고침</span>
    </button>
  </div>
</header>

<!-- ===== Tab Bar ===== -->
<nav class="tab-bar" role="tablist" aria-label="데이터 카테고리">
  <button class="tab-btn active" role="tab" aria-selected="true" aria-controls="panel-main" id="tab-main">📊 주요정보</button>
  <button class="tab-btn" role="tab" aria-selected="false" aria-controls="panel-stocks" id="tab-stocks">📱 개별종목</button>
</nav>

<!-- ===== Main ===== -->
<main id="main-content" class="container">

  <div id="panel-main" role="tabpanel" aria-labelledby="tab-main">

  <!-- Error banner (hidden by default) -->
  <div id="error-banner" class="error-banner hidden" role="alert">
    <p>데이터를 불러오지 못했습니다. 네트워크 상태를 확인하거나 재시도해 주세요.</p>
    <button class="btn-retry" id="btn-retry">재시도</button>
  </div>

  <!-- KPI Cards -->
  <section class="kpi-section" aria-label="주요 지표">
    <p class="section-label">실시간 지표</p>
    <div id="kpi-grid" class="kpi-grid" aria-live="polite" aria-atomic="false">
      <!-- Skeleton -->
    </div>
  </section>

  <!-- Charts -->
  <section class="charts-section" aria-label="추이 차트">
    <p class="section-label">추이 차트</p>
    <div id="charts-grid" class="charts-grid" aria-live="polite" aria-atomic="false">
      <!-- Skeleton -->
    </div>
  </section>

  </div><!-- /panel-main -->

  <div id="panel-stocks" role="tabpanel" aria-labelledby="tab-stocks" style="display:none;">
    <div class="stock-search">
      <div class="search-input-wrap">
        <input type="text" id="stock-search-input" placeholder="종목명 또는 심볼 검색 (예: 카카오, AAPL)" autocomplete="off">
        <button id="stock-search-btn" class="btn-search">검색</button>
      </div>
      <div id="search-results" class="search-results" style="display:none;"></div>
    </div>
    <section class="charts-section" aria-label="개별종목 차트">
      <p class="section-label">개별종목 차트</p>
      <div class="charts-grid" id="stocks-charts-grid" aria-live="polite" aria-atomic="false"></div>
    </section>
  </div><!-- /panel-stocks -->

</main>

<script>
// ─────────────────────────────────────────────
//  KR_STOCK_DICT 제거 — KRX 전 종목은 /api/kr-search 로 동적 검색
// ─────────────────────────────────────────────

// ─────────────────────────────────────────────
//  지표 목록 — 여기에 추가하면 카드+차트 자동 생성
// ─────────────────────────────────────────────
const INDICATORS = [
  { symbol: 'CL=F',  name: 'WTI 유가',      unit: 'USD' },
  { symbol: 'KRW=X', name: 'USD/KRW 환율',  unit: '원'  },
  { symbol: '^KS11', name: '코스피',          unit: 'pt'  },
  { symbol: '^KQ11', name: '코스닥',          unit: 'pt'  },
  { symbol: '^IXIC', name: '나스닥',          unit: 'pt'  },
  // 여기에 새 지표 추가하면 자동으로 카드+차트 생성
];

// Period options
const PERIOD_OPTIONS = [
  { id: '1d',  range: '1d',  interval: '5m',  label: '1일' },
  { id: '1mo', range: '1mo', interval: '1d',  label: '1개월' },
  { id: '3mo', range: '3mo', interval: '1d',  label: '3개월' },
  { id: '1y',  range: '1y',  interval: '1wk', label: '1년' },
  { id: '10y', range: '10y', interval: '1mo', label: '10년' },
];

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let charts = {};               // symbol → Chart instance
let stockCharts = {};          // symbol → Chart instance (개별종목)
let autoRefreshTimer = null;
let isLoading = false;
let isStocksLoading = false;
let investorData = null;       // 투자자별 매매동향 (코스피/코스닥)

// Per-chart period state — default: 1일
const chartPeriods = {};       // symbol → { range, interval, label }
INDICATORS.forEach(ind => {
  chartPeriods[ind.symbol] = { ...PERIOD_OPTIONS[0] };
});

// ─────────────────────────────────────────────
//  localStorage 관리
// ─────────────────────────────────────────────
const STORAGE_KEY = 'jamesclaw-stocks';

function loadSavedStocks() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) return JSON.parse(saved);
  } catch(e) {}
  return [
    { symbol: '005930.KS', name: '삼성전자', unit: '원' },
    { symbol: '000660.KS', name: 'SK하이닉스', unit: '원' },
  ];
}

function saveStocks() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STOCKS));
}

// ─────────────────────────────────────────────
//  개별종목 목록
// ─────────────────────────────────────────────
let STOCKS = loadSavedStocks();

const stockChartPeriods = {};
STOCKS.forEach(s => {
  stockChartPeriods[s.symbol] = { ...PERIOD_OPTIONS[0] };
});

// ─────────────────────────────────────────────
//  Helpers
// ─────────────────────────────────────────────
function formatValue(value, unit) {
  if (value == null) return '—';
  if (unit === 'USD') return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  if (unit === '원')  return value.toLocaleString('ko-KR', { maximumFractionDigits: 2 });
  // pt (코스피, 코스닥, 나스닥)
  return value.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function formatDate(isoString) {
  try {
    return new Date(isoString).toLocaleString('ko-KR', {
      month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hour12: false,
    });
  } catch { return isoString; }
}

function changeClass(pct) {
  if (pct == null) return 'flat';
  if (pct > 0) return 'up';
  if (pct < 0) return 'down';
  return 'flat';
}

function changeArrow(pct) {
  if (pct == null) return '';
  if (pct > 0) return '↑ ';
  if (pct < 0) return '↓ ';
  return '';
}

function formatChangeText(change, changePercent, unit) {
  if (changePercent == null) return '';
  const arrow = changeArrow(changePercent);
  const sign = change > 0 ? '+' : change < 0 ? '-' : '';
  const absChange = change != null ? formatValue(Math.abs(change), unit) : '';
  const pctSign = changePercent > 0 ? '+' : '';
  if (absChange) {
    return `${arrow}${sign}${absChange}${unit} (${pctSign}${changePercent.toFixed(2)}%)`;
  }
  return `${arrow}${pctSign}${changePercent.toFixed(2)}%`;
}

// ─────────────────────────────────────────────
//  Skeleton Rendering
// ─────────────────────────────────────────────
function renderSkeletons() {
  const kpiGrid = document.getElementById('kpi-grid');
  const chartsGrid = document.getElementById('charts-grid');

  kpiGrid.innerHTML = INDICATORS.map(() => `
    <div class="skeleton" aria-hidden="true">
      <div class="skel-line" style="width:60%;height:12px;"></div>
      <div class="skel-line" style="width:80%;height:32px;"></div>
      <div class="skel-line" style="width:50%;height:12px;"></div>
    </div>
  `).join('');

  chartsGrid.innerHTML = INDICATORS.map(() => `
    <div class="chart-skeleton" aria-hidden="true">
      <div class="chart-skel-bar" style="width:45%;height:12px;margin-bottom:16px;"></div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:160px;margin-bottom:8px;">
        ${Array.from({length:20},(_,i)=>`<div class="chart-skel-bar" style="flex:1;height:${20+Math.sin(i)*40+40}px;opacity:${0.3+i*0.03};"></div>`).join('')}
      </div>
    </div>
  `).join('');
}

// ─────────────────────────────────────────────
//  KPI Card Rendering (변동률은 항상 전일 대비)
// ─────────────────────────────────────────────
function renderKPICards(data) {
  const grid = document.getElementById('kpi-grid');
  grid.innerHTML = INDICATORS.map(ind => {
    const d = data[ind.symbol];
    if (!d) return renderKPIError(ind, '데이터 없음');
    if (d.error) return renderKPIError(ind, d.error);
    return renderKPICard(ind, d);
  }).join('');
}

function renderKPICard(ind, d) {
  const cls = changeClass(d.changePercent);
  const arrow = changeArrow(d.changePercent);
  const pct = d.changePercent != null ? `${Math.abs(d.changePercent).toFixed(2)}%` : '—';
  const changeAbs = d.change != null ? formatValue(Math.abs(d.change), ind.unit) : '—';
  const lastDateLabel = d.lastMarketDate ? formatLastMarketDateLabel(d.lastMarketDate) : null;
  const lastDateHTML = lastDateLabel
    ? `<div class="kpi-card__date">${escapeHtml(lastDateLabel)}</div>`
    : '';

  // 코스피/코스닥만 투자자 데이터 표시
  let investorHTML = '';
  if (investorData && (ind.symbol === '^KS11' || ind.symbol === '^KQ11')) {
    const inv = ind.symbol === '^KS11' ? investorData.kospi : investorData.kosdaq;
    if (inv) {
      const fmt = (v) => {
        if (v == null) return '<span class="kpi-card__investor-value">—</span>';
        const sign = v > 0 ? '+' : '';
        const cls = v > 0 ? 'up' : v < 0 ? 'down' : '';
        return `<span class="kpi-card__investor-value ${cls}">${sign}${v.toLocaleString()}억</span>`;
      };
      investorHTML = `
        <div class="kpi-card__investors">
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">외국인</span>${fmt(inv.foreign)}
          </div>
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">기관</span>${fmt(inv.institutional)}
          </div>
          <div class="kpi-card__investor-row">
            <span class="kpi-card__investor-label">개인</span>${fmt(inv.individual)}
          </div>
        </div>
      `;
    }
  }

  if (investorHTML) {
    return `
    <div class="kpi-card kpi-card--with-investors" id="kpi-${escapeHtml(ind.symbol)}" role="button" tabindex="0" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${ind.name} ${formatValue(d.current, ind.unit)} ${ind.unit}, 클릭하면 차트로 이동">
      <div class="kpi-card__main">
        <div class="kpi-card__label">
          ${escapeHtml(ind.name)}
          <small style="color:#475569;font-size:0.7rem;">(${ind.unit})</small>
        </div>
        <div class="kpi-card__value">${formatValue(d.current, ind.unit)}</div>
        ${lastDateHTML}
        <div class="kpi-card__change ${cls}">${arrow}${changeAbs}${ind.unit} (${d.changePercent > 0 ? '+' : ''}${pct})</div>
        <div class="kpi-card__source">출처: Yahoo Finance</div>
      </div>
      ${investorHTML}
    </div>
  `;
  }

  return `
    <div class="kpi-card" id="kpi-${escapeHtml(ind.symbol)}" role="button" tabindex="0" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${ind.name} ${formatValue(d.current, ind.unit)} ${ind.unit}, 클릭하면 차트로 이동">
      <div class="kpi-card__label">
        ${escapeHtml(ind.name)}
        <small style="color:#475569;font-size:0.7rem;">(${ind.unit})</small>
      </div>
      <div class="kpi-card__value">${formatValue(d.current, ind.unit)}</div>
      ${lastDateHTML}
      <div class="kpi-card__change ${cls}">${arrow}${changeAbs}${ind.unit} (${d.changePercent > 0 ? '+' : ''}${pct})</div>
      <div class="kpi-card__source">출처: Yahoo Finance</div>
    </div>
  `;
}

function renderKPIError(ind, msg) {
  return `
    <div class="kpi-card" id="kpi-${escapeHtml(ind.symbol)}" role="button" tabindex="0" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${ind.name} 데이터 오류, 클릭하면 차트로 이동">
      <div class="kpi-card__label">
        ${escapeHtml(ind.name)}
      </div>
      <div class="kpi-card__value" style="font-size:1.4rem;color:var(--text-muted)">—</div>
      <div class="kpi-card__error">⚠ ${escapeHtml(msg)}</div>
      <div class="kpi-card__source">출처: Yahoo Finance</div>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  Chart Stats (현재/최고/최저)
// ─────────────────────────────────────────────
function calcChartStats(history, unit) {
  if (!history || history.length === 0) return null;
  const closes = history.map(h => h.close).filter(v => v != null);
  if (closes.length === 0) return null;
  const current = closes[closes.length - 1];
  const high    = Math.max(...closes);
  const low     = Math.min(...closes);
  return { current, high, low };
}

function renderChartStatsHTML(stats, unit, indName) {
  if (!stats) return `
    <div class="chart-stats" aria-label="${escapeHtml(indName)} 가격 통계 없음">
      <span class="stat-current">현재 —</span>
      <span class="stat-high">최고 —</span>
      <span class="stat-low">최저 —</span>
    </div>`;
  return `
    <div class="chart-stats" aria-label="${escapeHtml(indName)} 가격 통계">
      <span class="stat-current" aria-label="현재가 ${formatValue(stats.current, unit)}">현재 ${formatValue(stats.current, unit)}</span>
      <span class="stat-high"    aria-label="최고가 ${formatValue(stats.high, unit)}">최고 ${formatValue(stats.high, unit)}</span>
      <span class="stat-low"     aria-label="최저가 ${formatValue(stats.low, unit)}">최저 ${formatValue(stats.low, unit)}</span>
    </div>
  `;
}

// ─────────────────────────────────────────────
//  Chart Rendering
// ─────────────────────────────────────────────

/** Build chart card HTML for one indicator */
function buildChartCardHTML(ind, i, history, lastTradeDate, changePercent, current, change) {
  const period = chartPeriods[ind.symbol];
  const stats  = calcChartStats(history, ind.unit);

  // For 1d charts, append date suffix if data is from a past trading day
  const dateSuffix = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel  = dateSuffix ? escapeHtml(dateSuffix) : '';

  return `
    <div class="chart-card" id="chart-${escapeHtml(ind.symbol)}">
      <div class="chart-card__header">
        <div class="chart-card__header-top">
          <div class="chart-card__title">
            ${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}
          </div>
          <div class="chart-period-toggle" role="group" aria-label="${escapeHtml(ind.name)} 기간 선택">
            ${PERIOD_OPTIONS.map(opt => `
              <button
                class="btn-chart-period"
                data-idx="${i}"
                data-symbol="${escapeHtml(ind.symbol)}"
                data-range="${opt.range}"
                data-interval="${opt.interval}"
                data-label="${opt.label}"
                aria-pressed="${period.range === opt.range}"
                aria-label="${escapeHtml(ind.name)} ${opt.label} 보기"
              >${opt.label}</button>
            `).join('')}
          </div>
        </div>
        <div class="chart-card__price-info">
          <span class="chart-card__current">${current != null ? formatValue(current, ind.unit) : ''}</span>
          <span class="chart-card__change ${changeClass(changePercent)}">
            ${formatChangeText(change, changePercent, ind.unit)}
          </span>
        </div>
      </div>
      ${renderChartStatsHTML(stats, ind.unit, ind.name)}
      <div class="chart-canvas-wrapper" id="chart-canvas-${i}">
        <canvas id="chart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>
      </div>
    </div>
  `;
}

/** Render full charts grid */
function renderCharts(data) {
  const grid = document.getElementById('charts-grid');

  // Destroy old chart instances
  Object.values(charts).forEach(c => c.destroy());
  charts = {};

  grid.innerHTML = INDICATORS.map((ind, i) => {
    const d = data[ind.symbol];
    const history = d?.history || [];
    const lastTradeDate = d?.lastTradeDate || null;
    return buildChartCardHTML(ind, i, history, lastTradeDate, d?.changePercent, d?.current, d?.change);
  }).join('');

  // Draw each chart
  INDICATORS.forEach((ind, i) => {
    const d = data[ind.symbol];
    const history = d?.history || [];
    drawChart(ind, i, history, d?.changePercent);
  });

  // Attach per-chart period button listeners
  attachChartPeriodListeners();
}

/** Draw (or redraw) a single chart */
function drawChart(ind, i, history, changePercent) {
  const period  = chartPeriods[ind.symbol];
  const wrapper = document.getElementById(`chart-canvas-${i}`);
  const canvas  = document.getElementById(`chart-${i}`);
  if (!wrapper && !canvas) return;

  if (history.length === 0) {
    // 빈 데이터: 캔버스 대신 안내 메시지 표시
    const emptyHtml = `
      <div class="chart-empty-state" role="status" aria-label="${escapeHtml(ind.name)} 데이터 없음">
        <span class="chart-empty-state__icon" aria-hidden="true">📭</span>
        <p class="chart-empty-state__title">데이터 없음</p>
        <p class="chart-empty-state__hint">거래 데이터를 가져오지 못했습니다</p>
      </div>`;
    if (wrapper) {
      wrapper.innerHTML = emptyHtml;
    } else if (canvas) {
      canvas.style.display = 'none';
      canvas.insertAdjacentHTML('afterend', emptyHtml);
    }
    return;
  }

  const labels = history.map(h => {
    if (period.range === '1d' && h.date.includes('T')) {
      const dt = new Date(h.date);
      return dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    if (period.range === '10y') {
      // Monthly data → YYYY/M
      const parts = h.date.split('-');
      return `${parts[0]}/${parseInt(parts[1])}`;
    }
    // 1mo, 3mo, 1y → M/D
    const parts = h.date.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const values = history.map(h => h.close);
  const color  = changePercent > 0 ? '#22c55e' : changePercent < 0 ? '#ef4444' : '#94a3b8';
  const ctx    = canvas.getContext('2d');

  // Gradient fill
  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, color + '33');
  gradient.addColorStop(1, color + '00');

  charts[ind.symbol] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: ind.name,
        data: values,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? false : { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          borderColor: '#334155',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#f8fafc',
          callbacks: {
            label: ctx => ` ${formatValue(ctx.parsed.y, ind.unit)} ${ind.unit}`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1e293b' },
          ticks: {
            color: '#64748b',
            maxTicksLimit: 6,
            font: { size: 11 },
          }
        },
        y: {
          grid: { color: '#1e293b' },
          ticks: {
            color: '#64748b',
            font: { size: 11 },
            callback: v => Math.round(v).toLocaleString('ko-KR'),
          }
        }
      }
    }
  });
}

/** Update one chart card after a period change */
function updateSingleChartCard(ind, i, history, lastTradeDate, changePercent, current, change) {
  const period = chartPeriods[ind.symbol];
  const card   = document.getElementById(`chart-${ind.symbol}`);
  if (!card) return;

  // Update background color based on period
  card.style.setProperty('background', period.range === '1d' ? '#1e293b' : '#2d1b4e', 'important');

  // Build title with optional date suffix for 1d
  const dateSuffix  = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel  = dateSuffix ? escapeHtml(dateSuffix) : '';

  // Update title text
  const titleEl = card.querySelector('.chart-card__title');
  if (titleEl) {
    titleEl.innerHTML = `${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}`;
  }

  // Update price info
  const priceInfoEl = card.querySelector('.chart-card__price-info');
  if (priceInfoEl) {
    const currentEl = priceInfoEl.querySelector('.chart-card__current');
    const changeEl  = priceInfoEl.querySelector('.chart-card__change');
    if (currentEl) currentEl.textContent = current != null ? formatValue(current, ind.unit) : '';
    if (changeEl) {
      changeEl.className = `chart-card__change ${changeClass(changePercent)}`;
      changeEl.textContent = formatChangeText(change, changePercent, ind.unit);
    }
  }

  // Update stats
  const statsEl = card.querySelector('.chart-stats');
  if (statsEl) {
    const stats = calcChartStats(history, ind.unit);
    statsEl.outerHTML = renderChartStatsHTML(stats, ind.unit, ind.name);
  }

  // Update aria-pressed on period buttons
  card.querySelectorAll('.btn-chart-period').forEach(btn => {
    btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
  });

  // Destroy old chart instance
  if (charts[ind.symbol]) {
    charts[ind.symbol].destroy();
    delete charts[ind.symbol];
  }

  // Replace canvas (Chart.js needs a fresh canvas)
  const wrapper = document.getElementById(`chart-canvas-${i}`);
  if (wrapper) {
    wrapper.innerHTML = `<canvas id="chart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>`;
  }

  // Redraw
  drawChart(ind, i, history, changePercent);
}

// ─────────────────────────────────────────────
//  Per-chart period button listeners
// ─────────────────────────────────────────────
function attachChartPeriodListeners() {
  document.querySelectorAll('.btn-chart-period').forEach(btn => {
    btn.addEventListener('click', () => {
      const symbol   = btn.dataset.symbol;
      const range    = btn.dataset.range;
      const interval = btn.dataset.interval;
      const label    = btn.dataset.label;
      const idx      = parseInt(btn.dataset.idx, 10);

      const ind = INDICATORS.find(i => i.symbol === symbol);
      if (!ind) return;

      // No-op if already selected
      if (chartPeriods[symbol].range === range) return;

      // Update period state
      chartPeriods[symbol] = { range, interval, label };

      // Fetch data for this symbol only
      fetchSingleChart(ind, idx);
    });
  });
}

// ─────────────────────────────────────────────
//  Data Fetching
// ─────────────────────────────────────────────

/** Fetch data for a single chart (period change) */
async function fetchSingleChart(ind, idx) {
  const period = chartPeriods[ind.symbol];
  const url = `/api/market?symbols=${encodeURIComponent(ind.symbol)}&range=${period.range}&interval=${period.interval}`;

  // Optimistic: update aria-pressed immediately
  const card = document.getElementById(`chart-${ind.symbol}`);
  if (card) {
    // Update background color optimistically
    card.style.setProperty('background', period.range === '1d' ? '#1e293b' : '#2d1b4e', 'important');
    card.querySelectorAll('.btn-chart-period').forEach(btn => {
      btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
      btn.disabled = true;
    });
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d    = json.data?.[ind.symbol];
    updateSingleChartCard(ind, idx, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change);
  } catch (err) {
    console.error(`fetchSingleChart error [${ind.symbol}]:`, err);
    // Restore buttons on error
    if (card) {
      card.querySelectorAll('.btn-chart-period').forEach(btn => btn.disabled = false);
    }
  } finally {
    if (card) {
      card.querySelectorAll('.btn-chart-period').forEach(btn => btn.disabled = false);
    }
  }
}
async function fetchData() {
  if (isLoading) return;
  isLoading = true;

  const btn  = document.getElementById('btn-refresh');
  const icon = document.getElementById('refresh-icon');
  btn.disabled = true;
  icon.outerHTML = `<span id="refresh-icon" class="spinner" aria-hidden="true"></span>`;

  try {
    // Group symbols by period
    const groups = new Map(); // "range|interval" → { period, symbols[] }
    INDICATORS.forEach(ind => {
      const p   = chartPeriods[ind.symbol];
      const key = `${p.range}|${p.interval}`;
      if (!groups.has(key)) groups.set(key, { period: p, symbols: [] });
      groups.get(key).symbols.push(ind.symbol);
    });

    // Fetch each group and merge results
    const allData = {};
    let latestUpdatedAt = null;

    // investor API도 병렬로 fetch
    const investorFetchPromise = fetch('/api/investor').then(r => r.json()).catch(() => null);

    for (const [, group] of groups) {
      const { period, symbols } = group;
      const url = `/api/market?symbols=${encodeURIComponent(symbols.join(','))}&range=${period.range}&interval=${period.interval}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      Object.assign(allData, json.data);
      latestUpdatedAt = json.updatedAt;
    }

    // investor 결과 반영
    const inv = await investorFetchPromise;
    if (inv && (inv.kospi || inv.kosdaq)) {
      investorData = inv;
    }

    document.getElementById('error-banner').classList.add('hidden');

    // Always render KPI from fetched data (changePercent is always "전일 대비")
    renderKPICards(allData);
    renderCharts(allData);

    const ts = formatDate(latestUpdatedAt);
    document.getElementById('last-updated').textContent = `업데이트: ${ts}`;
  } catch (err) {
    console.error('fetchData error:', err);
    document.getElementById('error-banner').classList.remove('hidden');
    document.getElementById('last-updated').textContent = '데이터 로드 실패';
  } finally {
    isLoading = false;
    const btnAfter  = document.getElementById('btn-refresh');
    btnAfter.disabled = false;
    const spinnerEl = document.getElementById('refresh-icon');
    if (spinnerEl && spinnerEl.classList.contains('spinner')) {
      spinnerEl.outerHTML = `<span id="refresh-icon" aria-hidden="true">⟳</span>`;
    }
  }
}

  return `

      <div class="chart-card__header">
        <div class="chart-card__header-top">
          <div class="chart-card__title">
            ${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="chart-period-toggle" role="group" aria-label="${escapeHtml(ind.name)} 기간 선택">
              ${PERIOD_OPTIONS.map(opt => `
                <button
                  class="btn-chart-period btn-stocks-period"
                  data-idx="${i}"
                  data-symbol="${escapeHtml(ind.symbol)}"
                  data-range="${opt.range}"
                  data-interval="${opt.interval}"
                  data-label="${opt.label}"
                  aria-pressed="${period.range === opt.range}"
                  aria-label="${escapeHtml(ind.name)} ${opt.label} 보기"
                >${opt.label}</button>
              `).join('')}
            </div>
            <button class="btn-remove-stock" data-symbol="${escapeHtml(ind.symbol)}" aria-label="${escapeHtml(ind.name)} 종목 삭제" title="종목 삭제">✕</button>
          </div>

          <span class="chart-card__change ${changeClass(changePercent)}">
            ${formatChangeText(change, changePercent, ind.unit)}
          </span>
        </div>
      </div>
      ${renderChartStatsHTML(stats, ind.unit, ind.name)}
      <div class="chart-canvas-wrapper" id="schart-canvas-${i}">
        <canvas id="schart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>
      </div>

  `;
}

// ─────────────────────────────────────────────
//  개별종목 — Draw Chart
// ─────────────────────────────────────────────
function drawStocksChart(ind, i, history, changePercent) {
  const period  = stockChartPeriods[ind.symbol];
  const wrapper = document.getElementById(`schart-canvas-${i}`);
  const canvas  = document.getElementById(`schart-${i}`);
  if (!wrapper && !canvas) return;

  if (history.length === 0) {
    const emptyHtml = `
      <div class="chart-empty-state" role="status" aria-label="${escapeHtml(ind.name)} 데이터 없음">
        <span class="chart-empty-state__icon" aria-hidden="true">📭</span>
        <p class="chart-empty-state__title">데이터 없음</p>
        <p class="chart-empty-state__hint">거래 데이터를 가져오지 못했습니다</p>
      </div>`;
    if (wrapper) wrapper.innerHTML = emptyHtml;
    return;
  }

  const labels = history.map(h => {
    if (period.range === '1d' && h.date.includes('T')) {
      const dt = new Date(h.date);
      return dt.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', hour12: false });
    }
    if (period.range === '10y') {
      const parts = h.date.split('-');
      return `${parts[0]}/${parseInt(parts[1])}`;
    }
    const parts = h.date.split('-');
    return `${parseInt(parts[1])}/${parseInt(parts[2])}`;
  });
  const values = history.map(h => h.close);
  const color  = changePercent > 0 ? '#22c55e' : changePercent < 0 ? '#ef4444' : '#94a3b8';
  const ctx    = canvas.getContext('2d');

  const gradient = ctx.createLinearGradient(0, 0, 0, 220);
  gradient.addColorStop(0, color + '33');
  gradient.addColorStop(1, color + '00');

  stockCharts[ind.symbol] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: ind.name,
        data: values,
        borderColor: color,
        backgroundColor: gradient,
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 0,
        pointHoverRadius: 5,
        pointHoverBackgroundColor: color,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: window.matchMedia('(prefers-reduced-motion: reduce)').matches ? false : { duration: 400 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#1e293b',
          borderColor: '#334155',
          borderWidth: 1,
          titleColor: '#94a3b8',
          bodyColor: '#f8fafc',
          callbacks: {
            label: ctx => ` ${formatValue(ctx.parsed.y, ind.unit)} ${ind.unit}`,
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#1e293b' },
          ticks: { color: '#64748b', maxTicksLimit: 6, font: { size: 11 } }
        },
        y: {
          grid: { color: '#1e293b' },
          ticks: { color: '#64748b', font: { size: 11 }, callback: v => Math.round(v).toLocaleString('ko-KR') }
        }
      }
    }
  });
}

// ─────────────────────────────────────────────
//  개별종목 — Render Charts Grid
// ─────────────────────────────────────────────
function renderStocksCharts(data) {
  const grid = document.getElementById('stocks-charts-grid');
  Object.values(stockCharts).forEach(c => c.destroy());
  stockCharts = {};

  grid.innerHTML = STOCKS.map((ind, i) => {
    const d = data[ind.symbol];
    return buildStocksChartCardHTML(ind, i, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change);
  }).join('');

  STOCKS.forEach((ind, i) => {
    drawStocksChart(ind, i, data[ind.symbol]?.history || [], data[ind.symbol]?.changePercent);
  });

  attachStocksChartPeriodListeners();
}

// ─────────────────────────────────────────────
//  개별종목 — Update Single Chart Card (period change)
// ─────────────────────────────────────────────
function updateSingleStocksChartCard(ind, i, history, lastTradeDate, changePercent, current, change) {
  const period = stockChartPeriods[ind.symbol];
  const card   = document.getElementById(`chart-${ind.symbol}`);
  if (!card) return;

  card.style.setProperty('background', period.range === '1d' ? '#1e293b' : '#2d1b4e', 'important');

  const dateSuffix = period.range === '1d' ? formatLastTradeDateSuffix(lastTradeDate) : '';
  const titleLabel = dateSuffix ? escapeHtml(dateSuffix) : '';

  const titleEl = card.querySelector('.chart-card__title');
  if (titleEl) {
    titleEl.innerHTML = `${escapeHtml(ind.name)}${titleLabel ? ` ${titleLabel}` : ''}`;
  }

  const priceInfoEl = card.querySelector('.chart-card__price-info');
  if (priceInfoEl) {
    const currentEl = priceInfoEl.querySelector('.chart-card__current');
    const changeEl  = priceInfoEl.querySelector('.chart-card__change');
    if (currentEl) currentEl.textContent = current != null ? formatValue(current, ind.unit) : '';
    if (changeEl) {
      changeEl.className = `chart-card__change ${changeClass(changePercent)}`;
      changeEl.textContent = formatChangeText(change, changePercent, ind.unit);
    }
  }

  const statsEl = card.querySelector('.chart-stats');
  if (statsEl) {
    const stats = calcChartStats(history, ind.unit);
    statsEl.outerHTML = renderChartStatsHTML(stats, ind.unit, ind.name);
  }

  card.querySelectorAll('.btn-stocks-period').forEach(btn => {
    btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
  });

  if (stockCharts[ind.symbol]) {
    stockCharts[ind.symbol].destroy();
    delete stockCharts[ind.symbol];
  }

  const wrapper = document.getElementById(`schart-canvas-${i}`);
  if (wrapper) {
    wrapper.innerHTML = `<canvas id="schart-${i}" aria-label="${escapeHtml(ind.name)} 차트" role="img"></canvas>`;
  }

  drawStocksChart(ind, i, history, changePercent);
}

// ─────────────────────────────────────────────
//  개별종목 — Period Button Listeners
// ─────────────────────────────────────────────
function attachStocksChartPeriodListeners() {
  document.querySelectorAll('.btn-stocks-period').forEach(btn => {
    btn.addEventListener('click', () => {
      const symbol   = btn.dataset.symbol;
      const range    = btn.dataset.range;
      const interval = btn.dataset.interval;
      const label    = btn.dataset.label;
      const idx      = parseInt(btn.dataset.idx, 10);

      const ind = STOCKS.find(s => s.symbol === symbol);
      if (!ind) return;
      if (stockChartPeriods[symbol].range === range) return;

      stockChartPeriods[symbol] = { range, interval, label };
      fetchSingleStocksChart(ind, idx);
    });
  });
}

// ─────────────────────────────────────────────
//  개별종목 — Fetch Single Chart (period change)
// ─────────────────────────────────────────────
async function fetchSingleStocksChart(ind, idx) {
  const period = stockChartPeriods[ind.symbol];
  const url = `/api/market?symbols=${encodeURIComponent(ind.symbol)}&range=${period.range}&interval=${period.interval}`;

  const card = document.getElementById(`chart-${ind.symbol}`);
  if (card) {
    card.style.setProperty('background', period.range === '1d' ? '#1e293b' : '#2d1b4e', 'important');
    card.querySelectorAll('.btn-stocks-period').forEach(btn => {
      btn.setAttribute('aria-pressed', String(btn.dataset.range === period.range));
      btn.disabled = true;
    });
  }

  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    const d    = json.data?.[ind.symbol];
    updateSingleStocksChartCard(ind, idx, d?.history || [], d?.lastTradeDate || null, d?.changePercent, d?.current, d?.change);
  } catch (err) {
    console.error(`fetchSingleStocksChart error [${ind.symbol}]:`, err);
  } finally {
    if (card) {
      card.querySelectorAll('.btn-stocks-period').forEach(btn => btn.disabled = false);
    }
  }
}

// ─────────────────────────────────────────────
//  개별종목 — Fetch All
// ─────────────────────────────────────────────
async function fetchStocksData() {
  if (isStocksLoading) return;
  isStocksLoading = true;

  renderStocksSkeletons();
  try {
    const groups = new Map();
    STOCKS.forEach(ind => {
      const p   = stockChartPeriods[ind.symbol];
      const key = `${p.range}|${p.interval}`;
      if (!groups.has(key)) groups.set(key, { period: p, symbols: [] });
      groups.get(key).symbols.push(ind.symbol);
    });

    const allData = {};
    for (const [, group] of groups) {
      const { period, symbols } = group;
      const url = `/api/market?symbols=${encodeURIComponent(symbols.join(','))}&range=${period.range}&interval=${period.interval}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const json = await res.json();
      Object.assign(allData, json.data);
    }

    renderStocksCharts(allData);
  } catch (err) {
    console.error('fetchStocksData error:', err);
  } finally {
    isStocksLoading = false;
  }
}

// Keyboard: left/right arrow navigation for tab bar
document.querySelector('.tab-bar').addEventListener('keydown', e => {
  const tabs = [...document.querySelectorAll('.tab-btn')];
  const idx  = tabs.indexOf(document.activeElement);
  if (idx === -1) return;
  if (e.key === 'ArrowRight') {
    e.preventDefault();
    const next = tabs[(idx + 1) % tabs.length];
    next.focus(); next.click();
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    const prev = tabs[(idx - 1 + tabs.length) % tabs.length];
    prev.focus(); prev.click();
  }
});

// ─────────────────────────────────────────────
//  Date label helper for 1d chart title
// ─────────────────────────────────────────────
function formatLastTradeDateSuffix(lastTradeDate) {
  if (!lastTradeDate) return '';
  const todayUTC = new Date().toISOString().split('T')[0];
  if (lastTradeDate === todayUTC) return '';
  // Parse as UTC noon to avoid local TZ shifts
  const d = new Date(lastTradeDate + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return ` (${month}/${day} ${dow})`;
}

// ─────────────────────────────────────────────
//  Date label helper for KPI previousCloseDate
// ─────────────────────────────────────────────
function formatPrevCloseDate(dateStr) {
  if (!dateStr) return null;
  // Parse as UTC noon to avoid local TZ shifts
  const d = new Date(dateStr + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return `${month}/${day} ${dow}`;
}

// ─────────────────────────────────────────────
//  Date label helper for lastMarketDate
//  Returns "3/13(금) 기준" if not today, "실시간" if today
// ─────────────────────────────────────────────
function formatLastMarketDateLabel(dateStr) {
  if (!dateStr) return null;
  // Today's date in UTC (YYYY-MM-DD)
  const now = new Date();
  const todayStr = now.toISOString().slice(0, 10);
  if (dateStr === todayStr) return '실시간';
  // Format as "3/13(금) 기준"
  const d = new Date(dateStr + 'T12:00:00Z');
  const month = d.getUTCMonth() + 1;
  const day   = d.getUTCDate();
  const names = ['일','월','화','수','목','금','토'];
  const dow   = names[d.getUTCDay()];
  return `${month}/${day}(${dow}) 기준`;
}

// ─────────────────────────────────────────────
//  종목 추가 / 삭제
// ─────────────────────────────────────────────
function getStockMeta(exchange) {
  if (!exchange) return { unit: '' };
  const ex = exchange.toUpperCase();
  // KOSPI, KOSDAQ, KSE, Korea, KRX 등 한국 주식 모두 인식
  if (
    ex === 'KOSPI' || ex === 'KOSDAQ' || ex === 'KSE' ||
    ex.includes('KOS') || ex.includes('KSC') || ex.includes('KOE') ||
    ex.includes('KRX') || ex.includes('KOREA')
  ) {
    return { unit: '원' };
  }
  if (['NYQ','NYS','NAS','PCX','NGM','NCM','ASE'].some(e => ex.includes(e))) {
    return { unit: 'USD' };
  }
  return { unit: '' };
}

async function addStock(result) {
  document.getElementById('search-results').style.display = 'none';
  document.getElementById('stock-search-input').value = '';
  if (STOCKS.find(s => s.symbol === result.symbol)) {
    const card = document.getElementById(`chart-${result.symbol}`);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    return;
  }
  const { unit } = getStockMeta(result.exchange);
  const newStock = { symbol: result.symbol, name: result.name, unit };
  STOCKS.push(newStock);
  stockChartPeriods[newStock.symbol] = { ...PERIOD_OPTIONS[0] };
  saveStocks();
  fetchStocksData();
}

function removeStock(symbol) {
  if (stockCharts[symbol]) {
    stockCharts[symbol].destroy();
    delete stockCharts[symbol];
  }
  const idx = STOCKS.findIndex(s => s.symbol === symbol);
  if (idx !== -1) STOCKS.splice(idx, 1);
  delete stockChartPeriods[symbol];
  saveStocks();
  if (STOCKS.length === 0) {
    Object.values(stockCharts).forEach(c => c.destroy());
    stockCharts = {};
    document.getElementById('stocks-charts-grid').innerHTML = '';
    return;
  }
  fetchStocksData();
}

      : '';
    return `
    <div class="search-result-item" data-symbol="${escapeHtml(r.symbol)}" data-name="${escapeHtml(r.name)}" data-exchange="${escapeHtml(r.exchange || '')}" data-type="${escapeHtml(r.type || '')}">
      <span>${typeTag}${escapeHtml(r.name)}</span>
      <span style="color:var(--text-muted);font-size:0.8rem;">${escapeHtml(r.symbol)} · ${escapeHtml(r.exchange || '')}</span>
    </div>
  `}).join('');
  resultsEl.querySelectorAll('.search-result-item').forEach(item => {
    item.addEventListener('click', () => {
      addStock({
        symbol:   item.dataset.symbol,
        name:     item.dataset.name,
        exchange: item.dataset.exchange,
        type:     item.dataset.type,
      });
    });
  });
}

// ─────────────────────────────────────────────
//  종목 검색 — 한글: KRX 전 종목, 영문: Yahoo Finance + KRX 병행
// ─────────────────────────────────────────────
async function searchStocks(query) {
  const q = query.trim();
  const resultsEl = document.getElementById('search-results');
  if (!q) {
    resultsEl.style.display = 'none';
    return;
  }
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="padding:1rem;color:var(--text-muted);">검색 중...</div>';

  const isKorean = /[가-힣]/.test(q);

  let results = [];
  try {
    if (isKorean) {
      // 한글 → KRX 전 종목 검색
      const res = await fetch(`/api/kr-search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      results = data.results || [];
    } else {
      // 영문 → Yahoo Finance + KRX 병행
      const [yahooRes, krxRes] = await Promise.allSettled([
        fetch(`/api/search?q=${encodeURIComponent(q)}`).then(r => r.json()),
        fetch(`/api/kr-search?q=${encodeURIComponent(q)}`).then(r => r.json()),
      ]);

      const seen = new Set();
      const merged = [];
      // KRX 결과 먼저
      if (krxRes.status === 'fulfilled') {
        for (const r of (krxRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      // Yahoo 결과
      if (yahooRes.status === 'fulfilled') {
        for (const r of (yahooRes.value.results || [])) {
          if (!seen.has(r.symbol)) { seen.add(r.symbol); merged.push(r); }
        }
      }
      results = merged;
    }
  } catch (err) {
    console.error('Search error:', err);
  }

  renderSearchResults(results);
}

document.getElementById('stock-search-btn').addEventListener('click', () => {
  searchStocks(document.getElementById('stock-search-input').value);
});

// Autocomplete: debounced search on input (min 1 char)
let _searchTimer = null;
document.getElementById('stock-search-input').addEventListener('input', e => {
  clearTimeout(_searchTimer);
  const q = e.target.value.trim();
  if (q.length >= 1) {
    _searchTimer = setTimeout(() => searchStocks(q), 300);
  } else {
    document.getElementById('search-results').style.display = 'none';
  }
});

document.getElementById('stock-search-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') { clearTimeout(_searchTimer); searchStocks(e.target.value); }
  if (e.key === 'Escape') document.getElementById('search-results').style.display = 'none';
});
document.addEventListener('click', e => {
  const searchContainer = document.querySelector('.stock-search');
  if (searchContainer && !searchContainer.contains(e.target)) {
    const resultsEl = document.getElementById('search-results');
    if (resultsEl) resultsEl.style.display = 'none';
  }
});
document.getElementById('stocks-charts-grid').addEventListener('click', e => {
  const btn = e.target.closest('.btn-remove-stock');
  if (!btn) return;
  const symbol = btn.dataset.symbol;
  const stock = STOCKS.find(s => s.symbol === symbol);
  if (!stock) return;
  if (confirm(`${stock.name} (${symbol}) 종목을 삭제하시겠습니까?`)) {
    removeStock(symbol);
  }
});

// ─────────────────────────────────────────────
//  XSS helper
// ─────────────────────────────────────────────
function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
// ─────────────────────────────────────────────
//  Dynamic header height → scroll-margin-top
//  Recalculates whenever the header reflows (resize / orientation change)
// ─────────────────────────────────────────────
function updateScrollMargin() {
  const header = document.querySelector('.dashboard-header');
  const tabBar = document.querySelector('.tab-bar');
  if (!header) return;
  document.documentElement.style.setProperty('--header-height', header.offsetHeight + 'px');
  if (tabBar) document.documentElement.style.setProperty('--tab-bar-height', tabBar.offsetHeight + 'px');
}
window.addEventListener('resize', updateScrollMargin);
updateScrollMargin();

renderSkeletons();
fetchData();
startAutoRefresh();
</script>
